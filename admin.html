<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Настройки bio.exe</title>
    <style>
        body { margin: 0; padding: 14px; font-family: Tahoma, Arial, sans-serif; font-size: 11px; background: #3a6ea5; color: #000; min-height: 100vh; display: flex; justify-content: center; align-items: flex-start; cursor: url("data:image/svg+xml,%3Csvg width='15' height='22' viewBox='0 0 15 22' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M1,1 l0,14 l3,-3 l2,5 l2,-1 l-2,-5 l4,0 z' fill='white' stroke='black' stroke-width='1.2'/%3E%3C/svg%3E"), default; }
        a, button, .window-controls img, .menu-items span { cursor: url("data:image/svg+xml,%3Csvg width='15' height='22' viewBox='0 0 15 22' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M1,1 l0,14 l3,-3 l2,5 l2,-1 l-2,-5 l4,0 z' fill='white' stroke='black' stroke-width='1.2'/%3E%3C/svg%3E"), pointer !important; }
        body::after { content: " "; display: block; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.1) 50%), linear-gradient(90deg, rgba(255, 0, 0, 0.03), rgba(0, 255, 0, 0.01), rgba(0, 0, 255, 0.03)), radial-gradient(circle, rgba(0,0,0,0) 60%, rgba(0,0,0,0.3) 100%); z-index: 9998; background-size: 100% 3px, 3px 100%, 100% 100%; pointer-events: none; }

        @keyframes openWindow { 0% { transform: scale(0.9); opacity: 0; } 100% { transform: scale(1); opacity: 1; } }
        
        .window { width: min(800px, 100%); border: 2px solid #000; background: #ece9d8; box-shadow: 2px 2px 0 #fff, 4px 4px 0 #444; position: relative; display: none; margin-bottom: 50px; opacity: 0; z-index: 10; } 
        .window.show { animation: openWindow 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.1) forwards; }
        
        .window-header { background: linear-gradient(180deg, #0a4cc5, #003f8c); color: #fff; padding: 5px 8px; font-weight: bold; font-size: 12px; display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid #4040a0; }
        .window-controls { display: flex; gap: 2px; }
        .window-controls img { width: 21px; height: 21px; border-radius: 3px; transition: transform 0.1s, filter 0.1s; }
        .window-controls img:hover { filter: brightness(1.2); }
        .window-controls img:active { transform: translateY(2px) scale(0.92); filter: brightness(0.8); }

        .menu-bar { background: #ece9d8; border-bottom: 1px solid #aca899; padding: 2px 8px; display: flex; justify-content: space-between; align-items: center; font-size: 11px; flex-wrap: wrap; gap: 5px; }
        .menu-items span { margin-right: 8px; padding: 2px 4px; border: 1px solid transparent; display: inline-block; transition: transform 0.1s; text-decoration: none; }
        .menu-items span:hover { background: #316ac5; color: #fff; border: 1px solid #000; border-radius: 2px; }
        .menu-items span:active { transform: translateY(2px); }

        .lang-switch { display: flex; gap: 2px; }
        .lang-switch button { border: 1px solid transparent; background: transparent; padding: 2px 6px; border-radius: 2px; transition: transform 0.1s; }
        .lang-switch button:hover { background: #c1d2ee; border: 1px solid #316ac5; }
        .lang-switch button.active { background: #c1d2ee; border: 1px solid #316ac5; font-weight: bold; }
        .lang-switch button:active { transform: translateY(2px); }

        .window-body { padding: 15px; }
        .fieldset { border: 1px solid #aca899; padding: 10px 15px 15px; margin-bottom: 15px; background: #faf9f4; border-radius: 3px; }
        .fieldset legend { color: #003f8c; font-weight: bold; }
        .form-group { margin-bottom: 8px; display: flex; align-items: center; flex-wrap: wrap; gap: 5px; }
        .form-group label { width: 140px; font-weight: bold; }
        .form-group input { flex: 1; min-width: 120px; padding: 4px; border: 2px inset #fff; background: #fff; font-family: Tahoma; font-size: 11px; }

        .item-box { background: #fff; border: 1px solid #aca899; padding: 10px; margin-bottom: 10px; position: relative; border-radius: 2px; transition: opacity 0.2s; }
        .item-box.dragging { opacity: 0.4; border: 2px dashed #0a4cc5; }
        .drag-handle { background: #e0e0e0; border: 1px solid #aca899; padding: 4px; text-align: center; color: #555; font-weight: bold; font-size: 10px; margin-bottom: 10px; cursor: grab; }
        .drag-handle:active { cursor: grabbing; background: #c1d2ee; }
        
        .btn { padding: 5px 15px; background: #e0e0e0; border: 2px outset #fff; color: #000; font-weight: bold; font-size: 11px; transition: transform 0.1s; display: inline-block; box-shadow: inset 0 1px 0 #fff; }
        .btn:hover { background: #f5f5f5; }
        .btn:active { border-style: inset; transform: translateY(2px) scale(0.97); box-shadow: none; }
        
        .remove-btn { position: absolute; top: 5px; right: 5px; background: #e0e0e0; border: 2px outset #fff; color: #cc0000; font-weight: bold; padding: 2px 6px; font-size: 10px; transition: transform 0.1s; }
        .remove-btn:active { border-style: inset; transform: translateY(2px) scale(0.95); }
        
        .actions { text-align: right; margin-top: 15px; border-top: 1px solid #aca899; padding-top: 15px; display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 5px;}
        .accent-btn { color: #003f8c; }

        #auth-overlay { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; background: #3a6ea5; z-index: 20000; display: flex; justify-content: center; align-items: center; }
        .auth-dialog { width: 350px; background: #ece9d8; border: 2px solid #000; box-shadow: 2px 2px 0 #fff, 4px 4px 0 #444; opacity: 0; animation: openWindow 0.3s forwards; }
        .auth-body { padding: 20px; display: flex; flex-direction: column; gap: 10px; }
        .auth-body input { padding: 5px; border: 2px inset #fff; font-family: Tahoma; }
        .error-msg { color: red; font-weight: bold; font-size: 11px; display: none; background: #ffdada; padding: 5px; border: 1px solid red; border-radius: 2px; }
    </style>
</head>
<body>

<div id="auth-overlay">
    <div class="auth-dialog">
        <div class="window-header" id="auth-header">Авторизация</div>
        <div class="auth-body">
            <p id="auth-msg" style="margin: 0; font-weight: bold; color: #003f8c;">Введите логин и пароль:</p>
            <input type="text" id="auth-login" placeholder="Логин">
            <input type="password" id="auth-pass" placeholder="Пароль">
            <input type="password" id="auth-pass-confirm" placeholder="Подтвердите пароль" style="display: none;">
            <div class="error-msg" id="auth-error">Неверный логин или пароль!</div>
            <div style="text-align: right; margin-top: 10px;"><button class="btn accent-btn" onclick="handleAuth()">ОК</button></div>
        </div>
    </div>
</div>

<div class="window" id="main-admin">
    <div class="window-header">
        <div><span data-i18n="winTitle">Свойства: bio.exe</span></div>
        <div class="window-controls">
            <img src="Minimize.png" alt="-">
            <img src="Maximize.png" alt="[]">
            <img src="Exit.png" alt="X" onclick="window.location.href='index.html'">
        </div>
    </div>
    
    <div class="menu-bar">
        <div class="menu-items">
            <span onclick="window.location.href='index.html'" data-i18n="goBack" style="font-weight: bold;">⬅ Назад к сайту</span>
            <span data-i18n="menuFile">Файл</span>
            <span data-i18n="menuEdit">Правка</span>
            <span data-i18n="menuView">Вид</span>
            <span data-i18n="menuHelp">Справка</span>
        </div>
        <div class="lang-switch">
            <button class="lang-btn" data-lang="en">EN</button>
            <button class="lang-btn active" data-lang="ru">RU</button>
        </div>
    </div>

    <div class="window-body">
        <div class="fieldset">
            <legend data-i18n="profileLegend">Профиль (Главная карточка)</legend>
            <div class="form-group"><label data-i18n="labelName">Имя (EN / RU):</label><input type="text" id="name_en"><input type="text" id="name_ru"></div>
            <div class="form-group"><label data-i18n="labelDesc">Описание (EN / RU):</label><input type="text" id="sub_en"><input type="text" id="sub_ru"></div>
            <div class="form-group"><label data-i18n="labelAvatar">Файл аватарки:</label><input type="text" id="avatar"></div>
        </div>

        <div class="fieldset">
            <legend data-i18n="socialsLegend">Социальные сети</legend>
            <div id="socials-container"></div>
            <button class="btn" onclick="addSocial()" data-i18n="btnAddSocial">+ Добавить соц. сеть</button>
        </div>

        <div class="fieldset">
            <legend data-i18n="portfolioLegend">Музыкальные Треки (Плеер и Смартлинки)</legend>
            <div id="tracks-container"></div>
            <button class="btn" onclick="addTrack()" data-i18n="btnAddTrack">+ Добавить трек</button>
        </div>

        <div class="actions">
            <div>
                <button class="btn" onclick="resetData()" data-i18n="btnReset">Сбросить настройки</button>
                <button class="btn" onclick="saveAsDefault()" data-i18n="btnSaveDefault" style="margin-left: 5px;">💾 Сделать по умолчанию</button>
            </div>
            <button class="btn accent-btn" onclick="saveData()" data-i18n="btnSave">Применить и Сохранить</button>
        </div>
    </div>
</div>

<script>
    let sessionData = sessionStorage.getItem('sessionAuth');
    let authCreds = sessionData ? JSON.parse(sessionData) : null;
    let isFirstSetup = false;

    async function hashPassword(password) {
        if (!crypto.subtle) { throw new Error("Шифрование заблокировано. Настройте SSL."); }
        const msgBuffer = new TextEncoder().encode(password);
        const hashBuffer = await crypto.subtle.digest('SHA-256', msgBuffer);
        const hashArray = Array.from(new Uint8Array(hashBuffer));
        return hashArray.map(b => b.toString(16).padStart(2, '0')).join('');
    }

    async function checkAuthStatus() {
        if (authCreds) { unlockAdmin(); return; }
        try {
            const res = await fetch('server.php?action=checkAuth');
            if(!res.ok) throw new Error("Ошибка сервера " + res.status);
            const data = await res.json();
            if (!data.isSetup) {
                isFirstSetup = true;
                document.getElementById('auth-header').textContent = "Первоначальная настройка";
                document.getElementById('auth-msg').textContent = "Придумайте логин и пароль:";
                document.getElementById('auth-pass-confirm').style.display = "block";
            }
        } catch (e) { document.getElementById('auth-error').textContent = e.message; document.getElementById('auth-error').style.display = "block"; }
    }

    async function handleAuth() {
        const user = document.getElementById('auth-login').value.trim();
        const pass = document.getElementById('auth-pass').value.trim();
        const err = document.getElementById('auth-error');
        err.style.display = "none";
        if (!user || !pass) { err.textContent = "Заполните все поля!"; err.style.display = "block"; return; }
        try {
            const hashedPass = await hashPassword(pass);
            if (isFirstSetup) {
                const passConfirm = document.getElementById('auth-pass-confirm').value.trim();
                if (pass !== passConfirm) { err.textContent = "Пароли не совпадают!"; err.style.display = "block"; return; }
                const res = await fetch('server.php?action=setupAuth', { method: 'POST', body: JSON.stringify({ login: user, hash: hashedPass }), headers: { 'Content-Type': 'application/json' }});
                const result = await res.json();
                if (result.success) {
                    authCreds = { login: user, hash: hashedPass };
                    sessionStorage.setItem('sessionAuth', JSON.stringify(authCreds));
                    unlockAdmin();
                } else { err.textContent = "Ошибка сервера."; err.style.display = "block"; }
            } else {
                const res = await fetch('server.php?action=login', { method: 'POST', body: JSON.stringify({ login: user, hash: hashedPass }), headers: { 'Content-Type': 'application/json' }});
                const result = await res.json();
                if (result.success) {
                    authCreds = { login: user, hash: hashedPass };
                    sessionStorage.setItem('sessionAuth', JSON.stringify(authCreds));
                    unlockAdmin();
                } else { err.textContent = "Неверный логин или пароль!"; err.style.display = "block"; }
            }
        } catch(e) { err.textContent = "Ошибка: " + e.message; err.style.display = "block"; }
    }

    async function unlockAdmin() {
        document.getElementById('auth-overlay').style.display = 'none';
        const win = document.getElementById('main-admin');
        win.style.display = 'block';
        setTimeout(() => { win.classList.add('show'); }, 50);
        await loadDataFromServer(); 
    }

    const i18nAdmin = {
        en: { 
            winTitle: 'Properties', goBack: '⬅ Back to site', profileLegend: 'Profile', labelName: 'Name (EN / RU):', labelDesc: 'Desc (EN / RU):', labelAvatar: 'Avatar URL:', socialsLegend: 'Socials', btnAddSocial: '+ Add Social', lblUrl: 'URL:', portfolioLegend: 'Tracks (Player & Smartlinks)', btnAddTrack: '+ Add Track', btnAddPlatform: '+ Add Platform', btnReset: 'Reset settings', btnSaveDefault: '💾 Save default', btnSave: 'Apply & Save', lblFile: 'Audio .mp3:', lblTitle: 'Title (EN/RU):', lblDesc: 'Desc (EN/RU):', lblLinks: 'Platforms:', btnDelete: 'Remove', lblSlug: 'Link ID (Slug):', lblCover: 'Cover Image URL:', menuFile: "File", menuEdit: "Edit", menuView: "View", menuHelp: "Help", dragHint: "☰ Drag to reorder"
        },
        ru: { 
            winTitle: 'Свойства', goBack: '⬅ Назад к сайту', profileLegend: 'Профиль', labelName: 'Имя (EN / RU):', labelDesc: 'Описание (EN / RU):', labelAvatar: 'Файл аватарки:', socialsLegend: 'Социальные сети', btnAddSocial: '+ Добавить', lblUrl: 'URL:', portfolioLegend: 'Треки (Плеер и Смартлинки)', btnAddTrack: '+ Добавить трек', btnAddPlatform: '+ Платформа', btnReset: 'Сбросить', btnSaveDefault: '💾 Сделать по умолчанию', btnSave: 'Применить и Сохранить', lblFile: 'Файл .mp3:', lblTitle: 'Название (EN/RU):', lblDesc: 'Опис. (EN/RU):', lblLinks: 'Платформы:', btnDelete: 'Удалить', lblSlug: 'ID ссылки (slug):', lblCover: 'Обложка трека:', menuFile: "Файл", menuEdit: "Правка", menuView: "Вид", menuHelp: "Справка", dragHint: "☰ Перетащите для сортировки"
        }
    };

    let adminLang = localStorage.getItem('siteLang') || 'ru';
    let formRendered = false;
    let bioData = { profile: {}, socials: [], tracks: [] };

    // --- СИСТЕМА DRAG AND DROP ---
    let draggedItem = null;
    function dragStart(e) {
        draggedItem = e.currentTarget;
        e.dataTransfer.effectAllowed = 'move';
        setTimeout(() => draggedItem.classList.add('dragging'), 0);
    }
    function dragOver(e) {
        e.preventDefault();
        e.dataTransfer.dropEffect = 'move';
        let target = e.currentTarget;
        if (target !== draggedItem) {
            let container = target.parentNode;
            let children = Array.from(container.children);
            let draggedIdx = children.indexOf(draggedItem);
            let targetIdx = children.indexOf(target);
            if (draggedIdx < targetIdx) target.after(draggedItem);
            else target.before(draggedItem);
        }
    }
    function dropItem(e) { e.preventDefault(); syncData(); }
    function dragEnd(e) { e.currentTarget.classList.remove('dragging'); draggedItem = null; renderForm(); }
    // -----------------------------

    async function loadDataFromServer() {
        try {
            const res = await fetch('server.php?action=getData');
            const data = await res.json();
            if (data && !data.error) bioData = data;
        } catch(e) {}
        if (!bioData.profile) bioData.profile = { en: "nefrozzik", ru: "nefrozzik" };
        if (!bioData.subtitle) bioData.subtitle = { en: "Musician", ru: "Музыкант" };
        if (!bioData.socials) bioData.socials = [];
        if (!bioData.tracks) bioData.tracks = [];
        bioData.tracks.forEach(t => { if(!t.platforms) t.platforms = []; });
        renderForm();
        setAdminLang(adminLang);
    }

    function syncData() {
        if (!formRendered) return;
        bioData.profile.en = document.getElementById('name_en').value;
        bioData.profile.ru = document.getElementById('name_ru').value;
        bioData.subtitle.en = document.getElementById('sub_en').value;
        bioData.subtitle.ru = document.getElementById('sub_ru').value;
        bioData.avatar = document.getElementById('avatar').value;

        bioData.socials = [];
        document.querySelectorAll('.social-item').forEach(item => {
            bioData.socials.push({ name_en: item.querySelector('.s-nen').value, name_ru: item.querySelector('.s-nru').value, url: item.querySelector('.s-url').value });
        });

        bioData.tracks = [];
        document.querySelectorAll('.track-item').forEach(item => {
            let track = {
                slug: item.querySelector('.t-slug').value.trim().toLowerCase().replace(/\s+/g, '-'),
                cover: item.querySelector('.t-cover').value,
                src: item.querySelector('.t-src').value,
                title_en: item.querySelector('.t-ten').value,
                title_ru: item.querySelector('.t-tru').value,
                desc_en: item.querySelector('.t-den').value,
                desc_ru: item.querySelector('.t-dru').value,
                platforms: []
            };
            item.querySelectorAll('.platform-item').forEach(pItem => {
                track.platforms.push({ name: pItem.querySelector('.p-name').value, url: pItem.querySelector('.p-url').value });
            });
            bioData.tracks.push(track);
        });
    }

    function renderForm() {
        document.getElementById('name_en').value = bioData.profile.en;
        document.getElementById('name_ru').value = bioData.profile.ru;
        document.getElementById('sub_en').value = bioData.subtitle.en;
        document.getElementById('sub_ru').value = bioData.subtitle.ru;
        document.getElementById('avatar').value = bioData.avatar;

        const socContainer = document.getElementById('socials-container');
        socContainer.innerHTML = '';
        bioData.socials.forEach(soc => {
            socContainer.insertAdjacentHTML('beforeend', `
            <div class="item-box social-item" ondragstart="dragStart(event)" ondragover="dragOver(event)" ondrop="dropItem(event)" ondragend="dragEnd(event)">
                <div class="drag-handle" onmousedown="this.parentNode.setAttribute('draggable', 'true')" onmouseup="this.parentNode.removeAttribute('draggable')" onmouseleave="this.parentNode.removeAttribute('draggable')">${i18nAdmin[adminLang].dragHint}</div>
                <button class="btn remove-btn" onclick="removeSocial(this)">${i18nAdmin[adminLang].btnDelete}</button>
                <div class="form-group"><label>${i18nAdmin[adminLang].labelName}</label><input type="text" class="s-nen" value="${soc.name_en}"><input type="text" class="s-nru" value="${soc.name_ru}"></div>
                <div class="form-group"><label>${i18nAdmin[adminLang].lblUrl}</label><input type="text" class="s-url" value="${soc.url}"></div>
            </div>`);
        });

        const trackContainer = document.getElementById('tracks-container');
        trackContainer.innerHTML = '';
        bioData.tracks.forEach(track => {
            let platformsHtml = track.platforms.map(plat => `<div class="platform-item form-group" style="margin-left:20px; border-left:2px solid #aca899; padding-left:8px;"><input type="text" value="${plat.name}" class="p-name" style="max-width:100px;"><input type="text" value="${plat.url}" class="p-url"><button class="btn" style="padding:2px 6px; color:#cc0000; min-width:25px;" onclick="removePlatform(this)">X</button></div>`).join('');
            platformsHtml += `<button class="btn" style="margin-left:20px; font-size:10px;" onclick="addPlatform(this)">${i18nAdmin[adminLang].btnAddPlatform}</button>`;
            
            trackContainer.insertAdjacentHTML('beforeend', `
            <div class="item-box track-item" ondragstart="dragStart(event)" ondragover="dragOver(event)" ondrop="dropItem(event)" ondragend="dragEnd(event)">
                <div class="drag-handle" onmousedown="this.parentNode.setAttribute('draggable', 'true')" onmouseup="this.parentNode.removeAttribute('draggable')" onmouseleave="this.parentNode.removeAttribute('draggable')">${i18nAdmin[adminLang].dragHint}</div>
                <button class="btn remove-btn" onclick="removeTrack(this)">${i18nAdmin[adminLang].btnDelete}</button>
                <div class="form-group"><label style="color:#003f8c;">${i18nAdmin[adminLang].lblSlug}</label><input type="text" value="${track.slug || ''}" class="t-slug" placeholder="my-cool-track"></div>
                <div class="form-group"><label style="color:#003f8c;">${i18nAdmin[adminLang].lblCover}</label><input type="text" value="${track.cover || ''}" class="t-cover" placeholder="cover.jpg"></div>
                <div class="form-group"><label>${i18nAdmin[adminLang].lblFile}</label><input type="text" value="${track.src}" class="t-src"></div>
                <div class="form-group"><label>${i18nAdmin[adminLang].lblTitle}</label><input type="text" value="${track.title_en}" class="t-ten"><input type="text" value="${track.title_ru}" class="t-tru"></div>
                <div class="form-group"><label>${i18nAdmin[adminLang].lblDesc}</label><input type="text" value="${track.desc_en}" class="t-den"><input type="text" value="${track.desc_ru}" class="t-dru"></div>
                <div style="margin-top:10px; font-weight:bold; margin-bottom:8px;">${i18nAdmin[adminLang].lblLinks}</div>
                ${platformsHtml}
            </div>`);
        });
        formRendered = true;
    }

    function addSocial() { syncData(); bioData.socials.push({name_en:"", name_ru:"", url:""}); renderForm(); }
    function removeSocial(btn) { btn.closest('.social-item').remove(); syncData(); renderForm(); }
    
    function addTrack() { syncData(); bioData.tracks.push({ slug:"", cover:"", src: "", title_en: "", title_ru: "", desc_en: "", desc_ru: "", platforms: [] }); renderForm(); }
    function removeTrack(btn) { btn.closest('.track-item').remove(); syncData(); renderForm(); }
    
    function addPlatform(btn) { 
        syncData(); 
        let trackItem = btn.closest('.track-item');
        let tIdx = Array.from(document.querySelectorAll('.track-item')).indexOf(trackItem);
        bioData.tracks[tIdx].platforms.push({name:"", url:""}); 
        renderForm(); 
    }
    function removePlatform(btn) { btn.closest('.platform-item').remove(); syncData(); renderForm(); }

    function setAdminLang(lang) {
        if(formRendered) syncData(); 
        adminLang = lang;
        localStorage.setItem('siteLang', lang); 
        document.querySelectorAll('[data-i18n]').forEach(el => {
            if (i18nAdmin[lang][el.dataset.i18n]) el.textContent = i18nAdmin[lang][el.dataset.i18n];
        });
        document.querySelectorAll('.lang-btn').forEach(btn => btn.classList.toggle('active', btn.dataset.lang === lang));
        if(formRendered) renderForm(); 
    }

    async function saveData() {
        syncData();
        try {
            const res = await fetch('server.php?action=saveData', { method: 'POST', body: JSON.stringify({ login: authCreds.login, hash: authCreds.hash, data: bioData }), headers: { 'Content-Type': 'application/json' }});
            const result = await res.json();
            if (result.success) alert(adminLang==='ru' ? "Успешно сохранено!" : "Saved!");
            else alert("Ошибка при сохранении!");
        } catch(e) { alert("Ошибка соединения."); }
    }

    async function saveAsDefault() {
        syncData();
        try {
            const res = await fetch('server.php?action=saveDefault', { method: 'POST', body: JSON.stringify({ login: authCreds.login, hash: authCreds.hash, data: bioData }), headers: { 'Content-Type': 'application/json' }});
            const result = await res.json();
            if (result.success) alert(adminLang==='ru' ? "Сохранено как дефолт!" : "Saved as default!");
        } catch(e) { alert("Ошибка соединения."); }
    }

    async function resetData() {
        if(confirm(adminLang==='ru' ? "Сбросить к дефолту?" : "Reset to default?")) {
            try {
                const res = await fetch('server.php?action=reset', { method: 'POST', body: JSON.stringify({ login: authCreds.login, hash: authCreds.hash }), headers: { 'Content-Type': 'application/json' }});
                const result = await res.json();
                if (result.success) location.reload();
            } catch(e) { alert("Ошибка соединения."); }
        }
    }

    document.querySelectorAll('.lang-btn').forEach(btn => btn.addEventListener('click', () => setAdminLang(btn.dataset.lang)));
    checkAuthStatus();
</script>
</body>
</html>
