<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>bio.exe</title>
    <style>
        html { scroll-behavior: smooth; }
        body { margin: 0; padding: 14px; font-family: Tahoma, Arial, sans-serif; font-size: 10px; background: #3a6ea5; color: #000; min-height: 100vh; cursor: url("data:image/svg+xml,%3Csvg width='15' height='22' viewBox='0 0 15 22' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M1,1 l0,14 l3,-3 l2,5 l2,-1 l-2,-5 l4,0 z' fill='white' stroke='black' stroke-width='1.2'/%3E%3C/svg%3E"), default; }
        a, button, .window-controls img, .progress-wrap, .menu-items span, .user-btn { cursor: url("data:image/svg+xml,%3Csvg width='15' height='22' viewBox='0 0 15 22' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M1,1 l0,14 l3,-3 l2,5 l2,-1 l-2,-5 l4,0 z' fill='white' stroke='black' stroke-width='1.2'/%3E%3C/svg%3E"), pointer !important; }
        body::after { content: " "; display: block; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.1) 50%), linear-gradient(90deg, rgba(255, 0, 0, 0.03), rgba(0, 255, 0, 0.01), rgba(0, 0, 255, 0.03)), radial-gradient(circle, rgba(0,0,0,0) 60%, rgba(0,0,0,0.3) 100%); z-index: 9998; background-size: 100% 3px, 3px 100%, 100% 100%; pointer-events: none; }
        
        #power-screen { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; background: linear-gradient(to bottom, #002D86 0%, #0046AA 15%, #0053E0 50%, #0046AA 85%, #002D86 100%); z-index: 10000; display: flex; align-items: center; justify-content: center; }
        .welcome-divider { position: absolute; top: 50%; left: 0; width: 100%; height: 2px; background: linear-gradient(to right, transparent 0%, #a4c1ff 50%, transparent 100%); transform: translateY(-50%); box-shadow: 0 0 8px #fff; z-index: 1; }
        .welcome-panel { display: flex; width: 100%; max-width: 700px; height: 300px; background: transparent; align-items: center; z-index: 2; }
        .welcome-left { flex: 1; text-align: right; padding-right: 40px; border-right: 1px solid rgba(255,255,255,0.4); color: #fff; text-shadow: 2px 2px 4px rgba(0,0,0,0.5); }
        .welcome-left h2 { font-size: 38px; margin: 0 0 10px 0; font-family: Arial, sans-serif; font-weight: normal; font-style: italic; }
        .welcome-left h2 span { font-weight: bold; }
        .welcome-left h2 span.xp { color: #ff8c00; vertical-align: super; font-size: 24px; }
        .welcome-left p { font-size: 16px; opacity: 0.9; margin: 0; }
        .welcome-right { flex: 1; padding-left: 40px; display: flex; flex-direction: column; gap: 15px; }
        
        .user-btn { display: flex; align-items: center; background: transparent; border: 1px solid transparent; color: #fff; text-align: left; padding: 8px; border-radius: 5px; transition: transform 0.1s, background 0.1s; }
        .user-btn:hover { background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.3); }
        .user-btn:active { transform: scale(0.95); background: rgba(255,255,255,0.2); }
        .user-icon { width: 50px; height: 50px; background: #fff; border: 2px solid #fff; border-radius: 3px; margin-right: 15px; display: flex; align-items: center; justify-content: center; box-shadow: 2px 2px 5px rgba(0,0,0,0.5); overflow: hidden; position: relative; }
        .user-icon::after { content: "👤"; font-size: 35px; color: #555; }
        .user-info b { font-size: 18px; display: block; text-shadow: 1px 1px 2px rgba(0,0,0,0.5); font-family: Arial, sans-serif; }
        .user-info span { font-size: 11px; color: #d0e0ff; }
        
        #boot-screen { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; background: #000; z-index: 9999; display: none; flex-direction: column; justify-content: center; align-items: center; transition: opacity 0.5s ease; cursor: wait; }
        .boot-logo { color: #fff; font-size: 36px; font-family: Arial, sans-serif; margin-bottom: 50px; display: flex; align-items: center; gap: 10px; }
        .boot-logo-text { display: flex; flex-direction: column; }
        .boot-logo-text .ms { font-size: 14px; margin-bottom: -5px; }
        .boot-logo-text .win { font-size: 36px; font-weight: bold; font-style: italic;}
        .boot-logo-text .win span { color: #ff8c00; font-weight: normal; }
        .xp-loader { width: 154px; height: 17px; border: 2px solid #a5a5a5; border-radius: 4px; position: relative; overflow: hidden; background: #000; padding: 1px; box-sizing: border-box; }
        .xp-loader-blocks { display: flex; gap: 2px; position: absolute; height: 11px; top: 1px; animation: xp-load 1.8s infinite linear; }
        .xp-block { width: 9px; height: 100%; background: linear-gradient(180deg, #2838c7 0%, #7a93ff 50%, #2838c7 100%); border-radius: 1px; }
        
        @keyframes xp-load { 0% { left: -40px; } 100% { left: 160px; } }
        @keyframes openWindow { 0% { transform: scale(0.9); opacity: 0; } 100% { transform: scale(1); opacity: 1; } }
        @keyframes blinkCursor { 0%, 100% { opacity: 1; } 50% { opacity: 0; } }
        @keyframes moveStripes { 0% { background-position: 0 0; } 100% { background-position: 20px 0; } }
        
        .window { width: min(840px, 95%); margin: 0 auto; border: 2px solid #000; background: #ece9d8; box-shadow: 2px 2px 0 #fff, 4px 4px 0 #444; overflow: hidden; opacity: 0; position: relative; z-index: 10; display: none; }
        .window.show { display: block; animation: openWindow 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.1) forwards; }
        .window-header { background: linear-gradient(180deg, #0a4cc5, #003f8c); color: #fff; padding: 5px 8px; font-weight: bold; font-size: 12px; display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid #4040a0; }
        .blink { animation: blinkCursor 1s step-end infinite; }
        
        .window-controls { display: flex; gap: 2px; align-items: center; }
        .window-controls img { width: 21px; height: 21px; border-radius: 3px; transition: transform 0.1s, filter 0.1s; }
        .window-controls img:hover { filter: brightness(1.2); }
        .window-controls img:active { transform: translateY(2px) scale(0.92); filter: brightness(0.8); }
        
        .menu-bar { background: #ece9d8; border-bottom: 1px solid #aca899; padding: 2px 8px; display: flex; justify-content: space-between; align-items: center; font-size: 11px; }
        
        .menu-items span { margin-right: 12px; padding: 2px 4px; color: #000; border: 1px solid transparent; display: inline-block; transition: transform 0.1s; }
        .menu-items span:hover { background: #316ac5; color: #fff; border: 1px solid #000; border-radius: 2px; }
        .menu-items span:active { transform: translateY(2px); }
        
        .lang-switch { display: flex; gap: 2px; }
        .lang-switch button { border: 1px solid transparent; background: transparent; color: #000; font-size: 10px; padding: 2px 6px; border-radius: 2px; transition: transform 0.1s; }
        .lang-switch button:hover { background: #c1d2ee; border: 1px solid #316ac5; }
        .lang-switch button.active { background: #c1d2ee; border: 1px solid #316ac5; font-weight: bold; }
        .lang-switch button:active { transform: translateY(2px); }
        
        .window-body { background: #fff; padding: 12px; border-top: 1px solid #fff; }
        .card { background: #f4f4f4; border: 2px solid #777; border-radius: 3px; padding: 10px; text-align: center; width: 100%; max-width: 360px; box-shadow: inset 0 1px 0 #fff; }
        .avatar { width: 90px; height: 90px; border-radius: 4px; background-size: cover; background-position: center; background-color: #999; margin: 0 auto 10px auto; border: 2px solid #666; box-shadow: inset 0 1px 0 #fff; transition: transform 0.2s, box-shadow 0.2s; display: block; }
        .avatar:hover { transform: scale(1.08); box-shadow: 0 0 0 1px #fff inset, 0 2px 6px rgba(0,0,0,0.3); }
        h1 { color: #000; margin: 10px 0 4px; font-size: 22px; font-weight: bold; }
        p.subtitle { color: #003f87; margin: 0 0 10px 0; font-size: 13px; font-weight: bold; }
        
        .btn { display: inline-block; margin: 4px 3px; padding: 4px 10px; text-decoration: none; color: #000; font-weight: bold; font-size: 12px; border: 2px outset #fff; background: #e0e0e0; border-radius: 2px; box-shadow: inset 0 1px 0 #fff; transition: transform 0.1s; }
        .btn:hover { background: #f5f5f5; }
        .btn:active { border-style: inset; transform: translateY(2px) scale(0.96); }
        
        .links { display: flex; justify-content: center; gap: 4px; flex-wrap: wrap; }
        .hero-section { display: flex; flex-wrap: wrap; gap: 12px; justify-content: center; align-items: flex-start; padding: 8px; }
        .portfolio-section { padding: 8px; text-align: center; background: #ece9d8; border: 2px solid #000; border-radius: 2px; margin-top: 10px; }
        .portfolio-section h2 { margin: 0 0 0px; font-size: 13px; color: #fff; background: linear-gradient(180deg, #0a4cc5, #003f8c); border: 1px solid #000; padding: 2px 4px; display: inline-block; }
        .portfolio-items { display: grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); gap: 6px; margin-top: 6px; }
        .portfolio-item { background: #fff; border: 2px solid #777; border-radius: 2px; padding: 8px; box-shadow: inset 0 1px 0 #fff; transition: transform 0.1s; }
        .portfolio-item:hover { transform: translateY(-2px); }
        .portfolio-item h3 { color: #000; font-size: 13px; margin: 0 0 4px; font-weight: bold; }
        .portfolio-item p { color: #222; font-size: 12px; margin-bottom: 8px; }
        .xp-player { margin-top: 10px; background: #e8ebf0; border: 2px solid #777; border-radius: 3px; padding: 8px; box-shadow: inset 0 1px 0 #fff; }
        .xp-player .title-bar { display: flex; justify-content: space-between; align-items: center; background: linear-gradient(180deg, #0a4cc5, #003f8c); color: #fff; font-size: 11px; font-weight: bold; padding: 3px 6px; border: 1px solid #000; margin-bottom: 6px; }
        .xp-player .controls { display: flex; align-items: center; flex-wrap: wrap; gap: 6px; margin-bottom: 6px; }
        
        .xp-player .controls button { background: #d6d6d6; border: 2px outset #fff; color: #000; font-weight: bold; padding: 3px 8px; border-radius: 2px; font-size: 11px; transition: transform 0.1s; }
        .xp-player .controls button:active { border-style: inset; transform: translateY(2px) scale(0.92); }
        
        .xp-player .progress-wrap { border: 2px solid #333; background: #fff; height: 12px; width: 100%; position: relative; }
        .xp-player .progress { background-color: #0b75ff; height: 100%; width: 0; background-image: linear-gradient(-45deg, rgba(255, 255, 255, 0.2) 25%, transparent 25%, transparent 50%, rgba(255, 255, 255, 0.2) 50%, rgba(255, 255, 255, 0.2) 75%, transparent 75%, transparent); background-size: 20px 20px; animation: moveStripes 1s linear infinite; transition: width 0.1s linear; }
        .xp-player .time { margin-top: 4px; font-size: 11px; color: #000; font-weight: bold; }
        
        .platform-links { margin-top: 6px; font-size: 11px; color: #333; }
        .platform-links a { color: #003f8c; text-decoration: none; border-bottom: 1px dotted #003f8c; }

        @media (max-width: 650px) {
            body { padding: 6px; } .window { width: 100%; }
            .welcome-panel { flex-direction: column; height: auto; padding: 20px; text-align: center; justify-content: center; align-items: center; }
            .welcome-divider { display: none; }
            .welcome-left { text-align: center; padding-right: 0; padding-bottom: 25px; border-right: none; border-bottom: 1px solid rgba(255, 255, 255, 0.4); margin-bottom: 25px; width: 100%; flex: unset; }
            .welcome-left h2 { font-size: 32px; } .welcome-left p { font-size: 14px; }
            .welcome-right { padding-left: 0; align-items: flex-start; justify-content: center; flex-direction: row; flex-wrap: wrap; width: 100%; flex: unset; gap: 15px; }
            .user-btn { width: 135px; max-width: unset; flex-direction: column; justify-content: flex-start; text-align: center; padding: 10px; }
            .user-btn .user-icon { margin-right: 0; margin-bottom: 10px; }
            .boot-logo { flex-direction: column; text-align: center; }
            .boot-logo-text .win { font-size: 28px; }
            .menu-bar { flex-wrap: wrap; gap: 6px; padding: 4px 8px; }
        }
    </style>
</head>
<body>

    <audio id="startup-sound" src="winxp.mp3" preload="auto"></audio>

   <div id="power-screen">
        <div class="welcome-divider"></div>
        <div class="welcome-panel">
            <div class="welcome-left">
                <h2><span>Windows</span><span class="xp">xp</span></h2>
                <p data-i18n="welcomeText">Чтобы начать работу, кликните свое имя пользователя</p>
            </div>
            <div class="welcome-right">
                <button class="user-btn" onclick="bootSystem('en')">
                    <div class="user-icon"></div>
                    <div class="user-info"><b>English</b><span>International</span></div>
                </button>
                <button class="user-btn" onclick="bootSystem('ru')">
                    <div class="user-icon"></div>
                    <div class="user-info"><b>Русский</b><span>Russian Language</span></div>
                </button>
            </div>
        </div>
    </div>

    <div id="boot-screen">
        <div class="boot-logo">
            <div class="boot-logo-text">
                <span class="ms">Microsoft</span>
                <span class="win">Windows <span>XP</span></span>
            </div>
        </div>
        <div class="xp-loader">
            <div class="xp-loader-blocks">
                <div class="xp-block"></div>
                <div class="xp-block"></div>
                <div class="xp-block"></div>
            </div>
        </div>
    </div>

    <div class="window" id="main-window">
        <div class="window-header">
            <div>bio.exe<span class="blink">_</span></div>
            <div class="window-controls">
                <img src="Minimize.png" alt="-">
                <img src="Maximize.png" alt="[]">
                <img src="Exit.png" alt="X">
            </div>
        </div>
        
        <div class="menu-bar">
            <div class="menu-items">
                <span data-i18n="menuFile">File</span>
                <span data-i18n="menuEdit">Edit</span>
                <span data-i18n="menuView">View</span>
                <span data-i18n="menuHelp">Help</span>
                <span onclick="window.location.href='admin.html'" data-i18n="menuSettings">⚙️ Настройки</span>
            </div>
            <div class="lang-switch">
                <button class="lang-btn active" data-lang="en">EN</button>
                <button class="lang-btn" data-lang="ru">RU</button>
            </div>
        </div>

        <div class="window-body">
            <div class="hero-section">
                <div class="card">
                    <div class="avatar" id="dyn-avatar"></div>
                    
                    <h1 id="dyn-name">nefrozzik</h1>
                    <p class="subtitle" id="dyn-subtitle">Musician</p>

                    <div class="links" id="dyn-socials">
                        </div>
                </div>
            </div>

            <div class="xp-player" id="xpPlayer">
                <div class="title-bar">
                    <div id="playerTitle" data-i18n="playerTitle">XP Music Player</div>
                    <div style="font-size: 10px;" data-i18n="playerVersion">v1.0</div>
                </div>
                <div class="controls">
                    <button id="prevBtn" data-i18n="prevBtn">◀◀</button>
                    <button id="playPauseBtn" data-i18n="playPauseBtn">▶</button>
                    <button id="nextBtn" data-i18n="nextBtn">▶▶</button>
                    <span id="currentTrack" style="margin-left: 8px; font-weight: bold; font-size: 12px;">---</span>
                </div>
                <div class="progress-wrap" id="progressWrap">
                    <div class="progress" id="progressBar"></div>
                </div>
                <div class="time"><span id="timeCurrent">0:00</span> / <span id="timeTotal">0:00</span></div>
            </div>

            <div id="portfolio" class="portfolio-section">
                <h2 data-i18n="portfolioTitle">My Portfolio</h2>
                <div class="portfolio-items" id="dyn-portfolio">
                    </div>
            </div>
        </div>
    </div>

    <script>
        const staticI18n = {
            en: {
                menuFile: 'File', menuEdit: 'Edit', menuView: 'View', menuHelp: 'Help', menuSettings: '⚙️ Settings',
                portfolioTitle: 'Music Tracks', playerTitle: 'XP Music Player', playerVersion: 'i really like this pretty thing',
                prevBtn: '◀◀', playPauseBtn: '▶', nextBtn: '▶▶', playInPlayer: '▶ Play in player', 
                welcomeText: 'To begin, click your user name', listenPlatforms: 'Listen on platforms:'
            },
            ru: {
                menuFile: 'Файл', menuEdit: 'Правка', menuView: 'Вид', menuHelp: 'Справка', menuSettings: '⚙️ Настройки',
                portfolioTitle: 'Музыкальные треки', playerTitle: 'Плеер XP', playerVersion: 'i really like this pretty thing',
                prevBtn: '◀◀', playPauseBtn: '▶', nextBtn: '▶▶', playInPlayer: '▶ Играть в плеере',
                welcomeText: 'Чтобы начать работу, кликните свое имя пользователя', listenPlatforms: 'Слушать на платформах:'
            }
        };

        let bioData = {
            profile: { en: "nefrozzik", ru: "nefrozzik" },
            subtitle: { en: "Musician", ru: "Музыкант" },
            avatar: "avatar.jpg",
            socials: [
                { name_en: "▶️ YouTube", name_ru: "▶️ YouTube", url: "https://youtube.com/@nefrozzik" }
            ],
            tracks: [
                { src: "rawr.mp3", title_en: "‹/RAWR›", title_ru: "‹/RAWR›", desc_en: "Latest release", desc_ru: "Новый релиз", platforms: [] }
            ]
        };

        let currentLang = localStorage.getItem('siteLang') || 'ru';
        let hasBooted = localStorage.getItem('hasBooted');
        let currentTrackIndex = 0;
        let audio = new Audio();

        async function loadServerData() {
            try {
                const response = await fetch('server.php?action=getData');
                const data = await response.json();
                if (data && !data.error) {
                    bioData = data;
                }
            } catch (error) {
                console.log("Сервер не ответил, используем шаблон по умолчанию.");
            }
            
            if(!bioData.tracks) bioData.tracks = [];
            bioData.tracks.forEach(t => { if(!t.platforms) t.platforms = []; });
            
            // Подгружаем первый трек, если он есть
            if (bioData.tracks.length > 0 && bioData.tracks[0].src) {
                audio.src = bioData.tracks[0].src;
            }
            
            setLanguage(currentLang);
        }

        function buildInterface() {
            document.getElementById('dyn-avatar').style.backgroundImage = `url('${bioData.avatar}')`;
            
            const linksContainer = document.getElementById('dyn-socials');
            linksContainer.innerHTML = '';
            if (bioData.socials) {
                bioData.socials.forEach(soc => {
                    const name = soc[`name_${currentLang}`] || soc.name_en || "Link";
                    linksContainer.insertAdjacentHTML('beforeend', `<a href="${soc.url}" class="btn" target="_blank">${name}</a>`);
                });
            }
            
            const portContainer = document.getElementById('dyn-portfolio');
            portContainer.innerHTML = '';
            if (bioData.tracks.length === 0) portContainer.innerHTML = '<p>Нет загруженных треков.</p>';

            bioData.tracks.forEach((track, index) => {
                const title = track[`title_${currentLang}`] || "Track";
                const desc = track[`desc_${currentLang}`] || "";
                const slugId = track.slug ? track.slug : index;
                
                let platformsHtml = '';
                if (track.platforms && track.platforms.length > 0) {
                    let links = track.platforms.map(p => `<a href="${p.url}" target="_blank">${p.name}</a>`);
                    platformsHtml = `<div class="platform-links"><span>${staticI18n[currentLang].listenPlatforms}</span> ${links.join(', ')}</div>`;
                }

                portContainer.insertAdjacentHTML('beforeend', `
                    <div class="portfolio-item">
                        <h3>${title}</h3>
                        <p>${desc}</p>
                        
                        <div style="display: flex; gap: 4px; justify-content: center; flex-wrap: wrap; margin-bottom: 8px;">
                            <button class="btn track-play-btn" data-track="${index}">${staticI18n[currentLang].playInPlayer}</button>
                            <a href="release.html?id=${slugId}" target="_blank" class="btn" style="color: #003f8c;">🔗 ${currentLang === 'ru' ? 'Страница релиза' : 'Release Page'}</a>
                        </div>
                        
                        ${platformsHtml}
                    </div>
                `);
            });

            document.querySelectorAll('.track-play-btn').forEach(btn => {
                btn.addEventListener('click', () => setTrack(Number(btn.dataset.track)));
            });
        }

        function setLanguage(lang) {
            currentLang = lang;
            localStorage.setItem('siteLang', lang); 
            
            document.querySelectorAll('[data-i18n]').forEach(el => {
                const key = el.dataset.i18n;
                if (staticI18n[lang][key]) el.textContent = staticI18n[lang][key];
            });

            if (bioData.profile) document.getElementById('dyn-name').textContent = bioData.profile[lang];
            if (bioData.subtitle) document.getElementById('dyn-subtitle').textContent = bioData.subtitle[lang];
            
            buildInterface();
            
            if(bioData.tracks && bioData.tracks.length > 0) {
                document.getElementById('currentTrack').textContent = bioData.tracks[currentTrackIndex][`title_${lang}`];
            }

            document.querySelectorAll('.lang-btn').forEach(btn => btn.classList.toggle('active', btn.dataset.lang === lang));
        }

        function bootSystem(lang) {
            localStorage.setItem('hasBooted', 'true'); 
            setLanguage(lang); 
            document.getElementById('power-screen').style.display = 'none';
            const bootScreen = document.getElementById('boot-screen');
            bootScreen.style.display = 'flex';
            
            setTimeout(() => {
                bootScreen.style.opacity = '0'; 
                const startupSound = document.getElementById('startup-sound');
                startupSound.volume = 0.5; 
                startupSound.play().catch(e => console.log("Sound error:", e));

                setTimeout(() => {
                    bootScreen.style.display = 'none';
                    document.getElementById('main-window').classList.add('show'); 
                }, 500); 
            }, 2500);
        }

        function setTrack(index) {
            if (!bioData.tracks || bioData.tracks.length === 0) return;
            currentTrackIndex = (index + bioData.tracks.length) % bioData.tracks.length;
            
            const trackUrl = bioData.tracks[currentTrackIndex].src;
            
            // Если ссылка пустая
            if (!trackUrl || trackUrl.trim() === '') {
                alert(currentLang === 'ru' ? 'Ошибка: У этого трека не указан файл (.mp3)' : 'Error: This track has no audio file (.mp3)');
                return;
            }

            audio.src = trackUrl;
            audio.load();
            document.getElementById('currentTrack').textContent = bioData.tracks[currentTrackIndex][`title_${currentLang}`];
            
            let playPromise = audio.play();
            if (playPromise !== undefined) {
                playPromise.catch(error => {
                    console.log("Playback error:", error);
                    alert(currentLang === 'ru' ? 'Ошибка загрузки трека! Проверьте ссылку на .mp3 файл.' : 'Track playback error! Check .mp3 URL.');
                });
            }
            
            document.getElementById('playPauseBtn').textContent = '⏸';
        }

        document.addEventListener('DOMContentLoaded', () => {
            if (hasBooted === 'true') {
                document.getElementById('power-screen').style.display = 'none';
                document.getElementById('main-window').classList.add('show');
            }

            loadServerData(); 

            document.querySelectorAll('.lang-btn').forEach(btn => {
                btn.addEventListener('click', () => setLanguage(btn.dataset.lang));
            });

            const playPauseBtn = document.getElementById('playPauseBtn');
            const prevBtn = document.getElementById('prevBtn');
            const nextBtn = document.getElementById('nextBtn');
            const progressBar = document.getElementById('progressBar');
            const progressWrap = document.getElementById('progressWrap');
            const timeCurrent = document.getElementById('timeCurrent');
            const timeTotal = document.getElementById('timeTotal');

            const formatTime = (sec) => {
                if (isNaN(sec)) return "0:00";
                const m = Math.floor(sec / 60);
                const s = Math.floor(sec % 60).toString().padStart(2, '0');
                return `${m}:${s}`;
            };

            playPauseBtn.addEventListener('click', () => {
                if (audio.paused) { 
                    let p = audio.play(); 
                    if(p) p.catch(()=>alert(currentLang==='ru'?'Ошибка воспроизведения. Выберите трек.':'Playback error. Select a track.'));
                    playPauseBtn.textContent = '⏸'; 
                } 
                else { audio.pause(); playPauseBtn.textContent = '▶'; }
            });

            prevBtn.addEventListener('click', () => setTrack(currentTrackIndex - 1));
            nextBtn.addEventListener('click', () => setTrack(currentTrackIndex + 1));

            audio.addEventListener('loadedmetadata', () => { timeTotal.textContent = formatTime(audio.duration); });
            audio.addEventListener('timeupdate', () => {
                if (audio.duration) {
                    progressBar.style.width = (audio.currentTime / audio.duration) * 100 + '%';
                    timeCurrent.textContent = formatTime(audio.currentTime);
                }
            });

            progressWrap.addEventListener('click', (event) => {
                if (!audio.duration) return;
                const rect = progressWrap.getBoundingClientRect();
                audio.currentTime = ((event.clientX - rect.left) / rect.width) * audio.duration;
            });

            audio.addEventListener('ended', () => setTrack(currentTrackIndex + 1));
        });
    </script>
</body>
</html>
