<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>nefrozzik BIO</title>
    <style>
        /* Плавная прокрутка */
        html {
            scroll-behavior: smooth;
        }

        /* Основной фон */
        body {
            margin: 0;
            padding: 0;
            font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #87ceeb 0%, #98fb98 40%, #add8e6 70%, #90ee90 100%);
            min-height: 100vh;
            position: relative;
        }

        /* АНИМАЦИИ */
        /* 1. Плавное парение пузырей */
        @keyframes float {
            0% { transform: translateY(0px) scale(1); }
            50% { transform: translateY(-20px) scale(1.02); }
            100% { transform: translateY(0px) scale(1); }
        }

        /* 2. Появление карточки при загрузке */
        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* 3. Пробегающий блик для кнопок */
        @keyframes shine {
            0% { left: -100%; }
            20% { left: 100%; }
            100% { left: 100%; }
        }

        /* 4. Появление портфолио */
        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(50px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Декоративные пузыри с разными параметрами анимации */
        .bubble {
            position: absolute;
            border-radius: 50%;
            background: radial-gradient(circle at 30% 30%, rgba(255, 255, 255, 0.8), rgba(255, 255, 255, 0.2) 60%, rgba(255, 255, 255, 0.6));
            box-shadow: inset 0 0 30px rgba(255, 255, 255, 0.8), 0 15px 30px rgba(0, 0, 0, 0.1);
            backdrop-filter: blur(5px);
            -webkit-backdrop-filter: blur(5px);
        }

        .bubble1 { 
            width: 200px; height: 200px; top: 10%; left: 15%; 
            animation: float 7s ease-in-out infinite; 
        }
        .bubble2 { 
            width: 100px; height: 100px; bottom: 20%; right: 20%; 
            animation: float 5s ease-in-out infinite 1s; /* Задержка 1s для асинхронности */
        }
        .bubble3 { 
            width: 280px; height: 280px; bottom: -50px; left: -20px; opacity: 0.8; 
            animation: float 9s ease-in-out infinite 2s; 
        }
        .bubble4 { 
            width: 150px; height: 150px; top: 50%; right: 10%; 
            animation: float 6s ease-in-out infinite 3s; 
        }

        /* Карточка */
        .card {
            background: rgba(255, 255, 255, 0.3);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.9);
            border-radius: 25px;
            padding: 50px 40px;
            text-align: center;
            width: 350px;
            box-shadow: 0 12px 40px rgba(0, 0, 0, 0.2), inset 0 0 30px rgba(255, 255, 255, 0.9);
            z-index: 10;
            animation: fadeUp 1.2s ease-out forwards; /* Анимация при загрузке */
        }

        /* Аватарка */
        .avatar {
            width: 130px;
            height: 130px;
            border-radius: 50%;
            background-image: url("avatar.jpg"); /* Замените на путь к вашей аватарке */
            background-size: cover;
            margin: 0 auto 25px auto;
            border: 5px solid rgba(255, 255, 255, 0.95);
            box-shadow: 0 6px 20px rgba(0, 0, 0, 0.25), inset 0 3px 8px rgba(255,255,255,0.6);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            transition: transform 0.4s ease, box-shadow 0.4s ease;
        }

        .avatar:hover {
            transform: scale(1.08) rotate(2deg); /* Легкое увеличение и поворот аватарки при наведении */
            box-shadow: 0 8px 25px rgba(0, 0, 0, 0.3), inset 0 3px 8px rgba(255,255,255,0.7);
        }

        /* Типографика */
        h1 {
            color: #1e88e5;
            margin: 0 0 8px 0;
            font-size: 28px;
            font-weight: 700;
            text-shadow: 2px 2px 4px rgba(255, 255, 255, 0.8), 0 0 10px rgba(30, 136, 229, 0.5);
        }

        p.subtitle {
            color: #43a047;
            margin: 0 0 35px 0;
            font-size: 16px;
            font-weight: 600;
            text-shadow: 1px 1px 2px rgba(255, 255, 255, 0.9);
        }

        /* Кнопки */
        .btn {
            display: block;
            margin: 18px 0;
            padding: 14px 25px;
            text-decoration: none;
            color: white;
            font-weight: bold;
            font-size: 17px;
            border-radius: 35px;
            background: linear-gradient(to bottom, #4caf50 0%, #2e7d32 100%);
            box-shadow: inset 0 2px 2px rgba(255, 255, 255, 0.9), 0 6px 12px rgba(0, 0, 0, 0.25);
            border: 2px solid #1b5e20;
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden; /* Важно для блика, чтобы он не выходил за края */
            backdrop-filter: blur(5px);
            -webkit-backdrop-filter: blur(5px);
        }

        /* Статичный верхний блик */
        .btn::before {
            content: '';
            position: absolute;
            top: 2px;
            left: 2px;
            right: 2px;
            height: 45%;
            background: linear-gradient(to bottom, rgba(255,255,255,0.7), rgba(255,255,255,0.1));
            border-radius: 28px 28px 10px 10px;
            pointer-events: none;
            z-index: 2;
        }

        /* Динамичный пробегающий блик */
        .btn::after {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 50%;
            height: 100%;
            background: linear-gradient(to right, rgba(255,255,255,0) 0%, rgba(255,255,255,0.4) 50%, rgba(255,255,255,0) 100%);
            transform: skewX(-25deg);
            z-index: 1;
        }

        .btn:hover {
            transform: translateY(-3px) scale(1.02);
            box-shadow: inset 0 2px 2px rgba(255, 255, 255, 1), 0 8px 16px rgba(0, 0, 0, 0.35);
            filter: brightness(1.15);
        }

        /* Запуск анимации блика при наведении */
        .btn:hover::after {
            animation: shine 1.8s infinite;
        }

        .btn:active {
            transform: translateY(1px) scale(0.98);
            box-shadow: inset 0 2px 4px rgba(0,0,0,0.3), 0 3px 6px rgba(0, 0, 0, 0.25);
        }

        /* Синяя версия кнопки */
        .btn.blue {
            background: linear-gradient(to bottom, #42a5f5 0%, #1565c0 100%);
            border: 2px solid #0d47a1;
        }

        /* Hero section */
        .hero-section {
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
            overflow: hidden;
        }


        /* Portfolio section */
        .portfolio-section {
            padding: 60px 20px;
            text-align: center;
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            opacity: 0;
            transform: translateY(50px);
            animation: fadeInUp 1s ease-out 0.5s forwards;
        }

        .portfolio-section h2 {
            color: #1e88e5;
            font-size: 32px;
            margin-bottom: 40px;
            text-shadow: 2px 2px 4px rgba(255, 255, 255, 0.8);
        }

        .portfolio-items {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 30px;
            max-width: 1200px;
        }

        .portfolio-item {
            background: rgba(255, 255, 255, 0.3);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.9);
            border-radius: 20px;
            padding: 30px;
            width: 300px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.2);
            opacity: 0;
            transform: translateY(30px);
            transition: opacity 0.6s ease, transform 0.6s ease, box-shadow 0.3s ease;
        }

        .portfolio-item.visible {
            opacity: 1;
            transform: translateY(0);
        }

        .portfolio-item:hover {
            transform: translateY(-5px);
            box-shadow: 0 12px 40px rgba(0, 0, 0, 0.3);
        }

        .portfolio-item:nth-child(1) { transition-delay: 0.12s; }
        .portfolio-item:nth-child(2) { transition-delay: 0.18s; }
        .portfolio-item:nth-child(3) { transition-delay: 0.24s; }

        .portfolio-item h3 {
            color: #1e88e5;
            font-size: 22px;
            margin-bottom: 10px;
        }

        .portfolio-item p {
            color: #333;
            font-size: 16px;
            margin-bottom: 20px;
        }

        .portfolio-item audio {
            width: 100%;
            margin-top: 15px;
            border-radius: 10px;
            background: rgba(255, 255, 255, 0.5);
            backdrop-filter: blur(5px);
            -webkit-backdrop-filter: blur(5px);
        }

        .btn.small {
            padding: 10px 15px;
            font-size: 14px;
            margin: 0;
        }
    </style>
</head>
<body>

    <div class="hero-section">
        <div class="bubble bubble1"></div>
        <div class="bubble bubble2"></div>
        <div class="bubble bubble3"></div>
        <div class="bubble bubble4"></div>

        <div class="card">
            <div class="avatar"></div>
            
            <h1>nefrozzik</h1>
            <p class="subtitle">Musician</p>

            <div class="links">
                <a href="https://www.youtube.com/@nefrozzik" class="btn">▶️ YouTube</a>
                <a href="https://t.me/nefrozzik" class="btn blue">💬 Telegram</a>
                <a href="https://github.com/nefrozzik" class="btn">🐙 GitHub</a>
                <a href="#portfolio" class="btn blue">🎧 Portfolio</a>
            </div>
        </div>

    </div>

    <div id="portfolio" class="portfolio-section">
        <h2>My Portfolio</h2>
        <div class="portfolio-items">
            <div class="portfolio-item">
                <h3>‹/RAWR›</h3>
                <p>My Latest Work</p>
                <audio controls>
                    <source src="rawr.mp3" type="audio/mpeg">
                    Your browser does not support the audio element.
                </audio>
            </div>
            <div class="portfolio-item">
                <h3>[hyperactivity]</h3>
                <p>My First Work</p>
                <audio controls>
                    <source src="hyperactivity.mp3" type="audio/mpeg">
                    Your browser does not support the audio element.
                </audio>
            </div>
            <div class="portfolio-item">
                <h3>in progress</h3>
                <p>soon...</p>
            </div>
        </div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const items = document.querySelectorAll('.portfolio-item');

            if ('IntersectionObserver' in window) {
                const observer = new IntersectionObserver((entries) => {
                    entries.forEach(entry => {
                        if (entry.isIntersecting) {
                            entry.target.classList.add('visible');
                            observer.unobserve(entry.target);
                        }
                    });
                }, { threshold: 0.15 });

                items.forEach(item => observer.observe(item));
            } else {
                // Fallback for older browsers
                items.forEach(item => item.classList.add('visible'));
            }
        });
    </script>

</body>
</html>
