<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>bio.exe</title>
    <style>
        /* Плавная прокрутка */
        html {
            scroll-behavior: smooth;
        }

        /* Основной фон и кастомные курсоры */
        body {
            margin: 0;
            padding: 14px;
            font-family: Tahoma, Arial, sans-serif;
            font-size: 10px;
            background: #3b8ec2;
            color: #000;
            min-height: 100vh;
            /* Кастомный курсор-стрелка */
            cursor: url("data:image/svg+xml,%3Csvg width='15' height='22' viewBox='0 0 15 22' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M1,1 l0,14 l3,-3 l2,5 l2,-1 l-2,-5 l4,0 z' fill='white' stroke='black' stroke-width='1.2'/%3E%3C/svg%3E"), default;
        }

        /* Кастомный курсор-рука для кликабельных элементов */
        a, button, .window-controls img, .progress-wrap, .menu-items span {
            cursor: url("data:image/svg+xml,%3Csvg width='15' height='22' viewBox='0 0 15 22' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M1,1 l0,14 l3,-3 l2,5 l2,-1 l-2,-5 l4,0 z' fill='white' stroke='black' stroke-width='1.2'/%3E%3C/svg%3E"), default;
        }

        /* --- АНИМАЦИИ --- */
        @keyframes openWindow {
            0% { transform: scale(0.9); opacity: 0; }
            100% { transform: scale(1); opacity: 1; }
        }

        @keyframes blinkCursor {
            0%, 100% { opacity: 1; }
            50% { opacity: 0; }
        }

        @keyframes moveStripes {
            0% { background-position: 0 0; }
            100% { background-position: 20px 0; }
        }
        /* ---------------- */

        .window {
            width: min(840px, 95%);
            margin: 0 auto;
            border: 2px solid #000;
            background: #ece9d8; /* Изменил на классический бежевый цвет окон XP */
            box-shadow: 2px 2px 0 #fff, 4px 4px 0 #444;
            overflow: hidden;
            animation: openWindow 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.1) forwards;
        }

        .window-header {
            background: linear-gradient(180deg, #0a4cc5, #003f8c);
            color: #fff;
            padding: 5px 8px;
            font-weight: bold;
            font-size: 12px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 2px solid #4040a0;
            text-shadow: none;
        }

        .blink {
            animation: blinkCursor 1s step-end infinite;
        }

        .window-controls { 
            display: flex; 
            gap: 2px; 
            align-items: center; 
        }
        
        .window-controls img {
            width: 21px;
            height: 21px;
            border-radius: 3px;
            box-shadow: 0 1px 1px rgba(0,0,0,0.3);
            transition: transform 0.1s ease;
        }

        .window-controls img:hover {
            filter: brightness(1.1);
        }

        .window-controls img:active {
            transform: translateY(1px);
        }

        /* --- СТРОКА МЕНЮ --- */
        .menu-bar {
            background: #ece9d8;
            border-bottom: 1px solid #aca899;
            padding: 2px 8px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 11px;
        }

        .menu-items span {
            margin-right: 12px;
            padding: 2px 4px;
            color: #000;
            border: 1px solid transparent;
        }

        .menu-items span:hover {
            background: #316ac5;
            color: #fff;
            border: 1px solid #000;
            border-radius: 2px;
        }

        .lang-switch {
            display: flex;
            gap: 2px;
        }

        .lang-switch button {
            border: 1px solid transparent;
            background: transparent;
            color: #000;
            font-size: 10px;
            padding: 2px 6px;
            border-radius: 2px;
            box-shadow: none;
        }

        .lang-switch button:hover {
            background: #c1d2ee;
            border: 1px solid #316ac5;
        }

        .lang-switch button.active {
            background: #c1d2ee;
            border: 1px solid #316ac5;
            font-weight: bold;
        }
        /* ------------------- */

        .window-body { background: #fff; padding: 12px; border-top: 1px solid #fff; }

        /* Карточка */
        .card {
            background: #f4f4f4;
            border: 2px solid #777;
            border-radius: 3px;
            padding: 10px;
            text-align: center;
            width: 100%;
            max-width: 360px;
            box-shadow: inset 0 1px 0 #fff;
        }

        /* Аватарка */
        .avatar {
            width: 90px;
            height: 90px;
            border-radius: 4px;
            background-image: url("avatar1.jpg");
            background-size: cover;
            background-position: center;
            background-color: #999;
            margin: 0 auto 10px auto;
            border: 2px solid #666;
            box-shadow: inset 0 1px 0 #fff;
            transition: transform 0.2s ease, box-shadow 0.2s ease;
            display: block;
        }

        .avatar:hover {
            transform: scale(1.08);
            box-shadow: 0 0 0 1px #fff inset, 0 2px 6px rgba(0,0,0,0.3);
        }

        h1 {
            color: #000;
            margin: 10px 0 4px;
            font-size: 22px;
            font-weight: bold;
        }

        p.subtitle {
            color: #003f87;
            margin: 0 0 10px 0;
            font-size: 13px;
            font-weight: bold;
        }

        .btn {
            display: inline-block;
            margin: 4px 3px;
            padding: 4px 10px;
            text-decoration: none;
            color: #000;
            font-weight: bold;
            font-size: 12px;
            border: 2px outset #fff;
            background: #e0e0e0;
            border-radius: 2px;
            box-shadow: inset 0 1px 0 #fff;
        }

        .btn:hover { background: #f5f5f5; }
        .btn:active { border-style: inset; }

        .links {
            display: flex;
            justify-content: center;
            gap: 4px;
            flex-wrap: wrap;
        }

        .hero-section {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            justify-content: center;
            align-items: flex-start;
            padding: 8px;
        }

        .portfolio-section {
            padding: 8px;
            text-align: center;
            background: #ece9d8;
            border: 2px solid #000;
            border-radius: 2px;
            margin-top: 10px;
        }

        .portfolio-section h2 {
            margin: 0 0 0px;
            font-size: 13px;
            color: #fff;
            background: linear-gradient(180deg, #0a4cc5, #003f8c);
            border: 1px solid #000;
            padding: 2px 4px;
            display: inline-block;
        }

        .portfolio-items {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
            gap: 6px;
            margin-top: 6px;
        }

        .portfolio-item {
            background: #fff;
            border: 2px solid #777;
            border-radius: 2px;
            padding: 8px;
            box-shadow: inset 0 1px 0 #fff;
            transition: transform 0.1s;
        }
        
        .portfolio-item:hover {
            transform: translateY(-2px);
        }

        .portfolio-item h3 { color: #000; font-size: 13px; margin: 0 0 4px; font-weight: bold; }
        .portfolio-item p { color: #222; font-size: 12px; margin-bottom: 8px; }

        .xp-player {
            margin-top: 10px;
            background: #e8ebf0;
            border: 2px solid #777;
            border-radius: 3px;
            padding: 8px;
            box-shadow: inset 0 1px 0 #fff;
        }
        .xp-player .title-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: linear-gradient(180deg, #0a4cc5, #003f8c);
            color: #fff;
            font-size: 11px;
            font-weight: bold;
            padding: 3px 6px;
            border: 1px solid #000;
            margin-bottom: 6px;
        }
        .xp-player .controls {
            display: flex;
            align-items: center;
            gap: 6px;
            margin-bottom: 6px;
        }
        .xp-player .controls button {
            background: #d6d6d6;
            border: 2px outset #fff;
            color: #000;
            font-weight: bold;
            padding: 3px 8px;
            border-radius: 2px;
            font-size: 11px;
        }
        .xp-player .progress-wrap {
            border: 2px solid #333;
            background: #fff;
            height: 12px;
            width: 100%;
            position: relative;
        }
        .xp-player .progress {
            background-color: #0b75ff;
            height: 100%;
            width: 0;
            background-image: linear-gradient(-45deg, rgba(255, 255, 255, 0.2) 25%, transparent 25%, transparent 50%, rgba(255, 255, 255, 0.2) 50%, rgba(255, 255, 255, 0.2) 75%, transparent 75%, transparent);
            background-size: 20px 20px;
            animation: moveStripes 1s linear infinite;
            transition: width 0.1s linear;
        }
        
        .xp-player .time {
            margin-top: 4px;
            font-size: 11px;
            color: #000;
            font-weight: bold;
        }

        .platform-links {
            margin-top: 6px;
            font-size: 11px;
            color: #333;
        }

        .platform-links a {
            color: #003f8c;
            text-decoration: none;
            border-bottom: 1px dotted #003f8c;
        }
    </style>
</head>
<body>
    <div class="window">
        <div class="window-header">
            <div>bio.exe<span class="blink">_</span></div>
            <div class="window-controls">
                <img src="Minimize.png">
                <img src="Maximize.png">
                <img src="Exit.png">
            </div>
        </div>
        
        <div class="menu-bar">
            <div class="menu-items">
                <span data-i18n="menuFile">File</span>
                <span data-i18n="menuEdit">Edit</span>
                <span data-i18n="menuView">View</span>
                <span data-i18n="menuHelp">Help</span>
            </div>
            <div class="lang-switch">
                <button class="lang-btn active" data-lang="en">EN</button>
                <button class="lang-btn" data-lang="ru">RU</button>
            </div>
        </div>

        <div class="window-body">
            <div class="hero-section">
                <div class="card">
                    <div class="avatar"></div>
                    
                    <h1 data-i18n="heading">nefrozzik</h1>
                    <p class="subtitle" data-i18n="subtitle">Musician</p>

                    <div class="links">
                        <a href="https://www.youtube.com/@nefrozzik" class="btn" data-i18n="youtube">▶️ YouTube</a>
                        <a href="https://t.me/nefrozzik" class="btn" data-i18n="telegram">💬 Telegram</a>
                        <a href="https://github.com/nefrozzik" class="btn" data-i18n="github">🐙 GitHub</a>
                    </div>
                </div>
            </div>

            <div class="xp-player" id="xpPlayer">
                <div class="title-bar">
                    <div id="playerTitle" data-i18n="playerTitle">XP Music Player</div>
                    <div style="font-size: 10px;" data-i18n="playerVersion">v1.0</div>
                </div>
                <div class="controls">
                    <button id="prevBtn" data-i18n="prevBtn">◀◀</button>
                    <button id="playPauseBtn" data-i18n="playPauseBtn">▶</button>
                    <button id="nextBtn" data-i18n="nextBtn">▶▶</button>
                    <span id="currentTrack" style="margin-left: 8px; font-weight: bold; font-size: 12px;">‹/RAWR›</span>
                </div>
                <div class="progress-wrap" id="progressWrap">
                    <div class="progress" id="progressBar"></div>
                </div>
                <div class="time"><span id="timeCurrent">0:00</span> / <span id="timeTotal">0:00</span></div>
            </div>

            <div id="portfolio" class="portfolio-section">
                <h2 data-i18n="portfolioTitle">My Portfolio</h2>
                <div class="portfolio-items">
                    <div class="portfolio-item">
                        <h3 data-i18n="track1">‹/RAWR›</h3>
                        <p data-i18n="track1desc">My Latest Work</p>
                        <button class="btn" data-track="0" data-i18n="playInPlayer">▶ Play in player</button>
                        <div class="platform-links"><span data-i18n="listenPlatforms">Listen on platforms:</span> <a href="https://www.youtube.com/watch?v=Voss-ccMRic">YouTube</a>, <a href="https://on.soundcloud.com/aYUJxLTtav4cOc9Jhz">SoundCloud</a></div>
                    </div>
                    <div class="portfolio-item">
                        <h3 data-i18n="track2">[hyperactivity]</h3>
                        <p data-i18n="track2desc">My First Work</p>
                        <button class="btn" data-track="1" data-i18n="playInPlayer">▶ Play in player</button>
                        <div class="platform-links"><span data-i18n="listenPlatforms">Listen on platforms:</span> <a href="https://www.youtube.com/watch?v=76RMNxRCti4">YouTube</a>, <a href="https://on.soundcloud.com/qA7dHvcBE0oyPfHU87">SoundCloud</a></div>
                    </div>
                    <div class="portfolio-item">
                        <h3 data-i18n="track3">In progress</h3>
                        <button class="btn" disabled style="opacity: .5; cursor: not-allowed;" data-i18n="comingSoon">🔒 Coming soon</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const i18nData = {
            en: {
                menuFile: 'File',
                menuEdit: 'Edit',
                menuView: 'View',
                menuHelp: 'Help',
                heading: 'nefrozzik',
                subtitle: 'Musician',
                youtube: '▶️ YouTube',
                telegram: '💬 Telegram',
                github: '🐙 GitHub',
                portfolioTitle: 'My Portfolio',
                playerTitle: 'XP Music Player',
                playerVersion: 'i really like this pretty thing',
                prevBtn: '◀◀',
                playPauseBtn: '▶',
                nextBtn: '▶▶',
                playInPlayer: '▶ Play in player',
                comingSoon: '🔒 Coming soon',
                listenPlatforms: 'Listen on platforms:',
                track1: '‹/RAWR›',
                track1desc: 'My Latest Work',
                track2: '[hyperactivity]',
                track2desc: 'My First Work',
                track3: 'In progress...',
            },
            ru: {
                menuFile: 'Файл',
                menuEdit: 'Правка',
                menuView: 'Вид',
                menuHelp: 'Справка',
                heading: 'nefrozzik',
                subtitle: 'Музыкант',
                youtube: '▶️ YouTube',
                telegram: '💬 Telegram',
                github: '🐙 GitHub',
                portfolioTitle: 'Моё Портфолио',
                playerTitle: 'Плеер XP',
                playerVersion: 'i really like this pretty thing',
                prevBtn: '◀◀',
                playPauseBtn: '▶',
                nextBtn: '▶▶',
                playInPlayer: '▶ Играть в плеере',
                comingSoon: '🔒 Скоро',
                listenPlatforms: 'Слушать на платформах:',
                track1: '‹/RAWR›',
                track1desc: 'Моя последняя работа',
                track2: '[hyperactivity]',
                track2desc: 'Моя первая работа',
                track3: 'В процессе...',
            }
        };

        function setLanguage(lang) {
            document.querySelectorAll('[data-i18n]').forEach(el => {
                const key = el.dataset.i18n;
                if (i18nData[lang] && i18nData[lang][key]) {
                    el.textContent = i18nData[lang][key];
                }
            });
            document.querySelectorAll('.lang-btn').forEach(btn => btn.classList.toggle('active', btn.dataset.lang === lang));
        }

        document.addEventListener('DOMContentLoaded', () => {
            document.querySelectorAll('.lang-btn').forEach(btn => {
                btn.addEventListener('click', () => setLanguage(btn.dataset.lang));
            });

            setLanguage('ru');

            const tracks = [
                { title: '‹/RAWR›', src: 'rawr.mp3' },
                { title: '[hyperactivity]', src: 'hyperactivity.mp3' }
            ];
            
            let currentTrackIndex = 0;
            const audio = new Audio(tracks[0].src);
            const playPauseBtn = document.getElementById('playPauseBtn');
            const prevBtn = document.getElementById('prevBtn');
            const nextBtn = document.getElementById('nextBtn');
            const currentTrackEl = document.getElementById('currentTrack');
            const progressBar = document.getElementById('progressBar');
            const progressWrap = document.getElementById('progressWrap');
            const timeCurrent = document.getElementById('timeCurrent');
            const timeTotal = document.getElementById('timeTotal');

            const formatTime = (sec) => {
                if (isNaN(sec)) return "0:00";
                const m = Math.floor(sec / 60);
                const s = Math.floor(sec % 60).toString().padStart(2, '0');
                return `${m}:${s}`;
            };

            function updateTrackText() {
                currentTrackEl.textContent = tracks[currentTrackIndex].title;
            }

            function playTrack() {
                audio.play().catch(() => { console.log("User interaction required") });
                playPauseBtn.textContent = '⏸';
            }

            function pauseTrack() {
                audio.pause();
                playPauseBtn.textContent = '▶';
            }

            function setTrack(index) {
                currentTrackIndex = (index + tracks.length) % tracks.length;
                audio.src = tracks[currentTrackIndex].src;
                audio.load();
                updateTrackText();
                playTrack();
            }

            playPauseBtn.addEventListener('click', () => {
                if (audio.paused) playTrack(); else pauseTrack();
            });

            prevBtn.addEventListener('click', () => setTrack(currentTrackIndex - 1));
            nextBtn.addEventListener('click', () => setTrack(currentTrackIndex + 1));

            document.querySelectorAll('[data-track]').forEach(btn => {
                btn.addEventListener('click', () => {
                    setTrack(Number(btn.dataset.track));
                });
            });

            audio.addEventListener('loadedmetadata', () => {
                timeTotal.textContent = formatTime(audio.duration);
            });

            audio.addEventListener('timeupdate', () => {
                if (audio.duration) {
                    const percent = (audio.currentTime / audio.duration) * 100;
                    progressBar.style.width = percent + '%';
                    timeCurrent.textContent = formatTime(audio.currentTime);
                }
            });

            progressWrap.addEventListener('click', (event) => {
                if (!audio.duration) return;
                const rect = progressWrap.getBoundingClientRect();
                const percent = (event.clientX - rect.left) / rect.width;
                audio.currentTime = percent * audio.duration;
            });

            audio.addEventListener('ended', () => setTrack(currentTrackIndex + 1));
        });
    </script>
</body>
</html>
