<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>nefrozzik BIO</title>
    <style>
        /* Плавная прокрутка */
        html {
            scroll-behavior: smooth;
        }

        /* Основной фон */
        body {
            margin: 0;
            padding: 14px;
            font-family: Tahoma, Arial, sans-serif;
            font-size: 10px;
            background: #3b8ec2;
            color: #000;
            min-height: 100vh;
        }

        .window {
            width: min(840px, 95%);
            margin: 0 auto;
            border: 2px solid #000;
            background: #c0c0c0;
            box-shadow: 2px 2px 0 #fff, 4px 4px 0 #444;
            overflow: hidden;
        }

        .window-header {
            background: #000080;
            color: #fff;
            padding: 5px 8px;
            font-weight: bold;
            font-size: 12px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 2px solid #4040a0;
            text-shadow: none;
        }

        .window-controls { display: flex; gap: 4px; }
        .window-controls span {
            width: 16px;
            height: 16px;
            border: 1px solid #999;
            background: #c0c0c0;
            color: #000;
            font-size: 12px;
            line-height: 16px;
            text-align: center;
            font-weight: bold;
            border-radius: 2px;
            box-shadow: inset 0 1px 0 rgba(255,255,255,0.7);
        }

        .window-body { background: #fff; padding: 12px; }

        /* АНИМАЦИИ */
        /* Classic XP: no animations */

        /* Карточка */
        .card {
            background: #f4f4f4;
            border: 2px solid #777;
            border-radius: 3px;
            padding: 10px;
            text-align: center;
            width: 100%;
            max-width: 360px;
            box-shadow: inset 0 1px 0 #fff;
        }

        /* Аватарка */
        .avatar {
            width: 90px;
            height: 90px;
            border-radius: 4px;
            background-image: url("avatar.jpg");
            background-size: cover;
            background-position: center;
            background-color: #999;
            margin: 0 auto 10px auto;
            border: 2px solid #666;
            box-shadow: inset 0 1px 0 #fff;
            transition: transform 0.2s ease, box-shadow 0.2s ease;
            display: block;
        }

        .avatar:hover {
            transform: scale(1.08);
            box-shadow: 0 0 0 1px #fff inset, 0 2px 6px rgba(0,0,0,0.3);
        }

        /* Типографика */
        h1 {
            color: #000;
            margin: 10px 0 4px;
            font-size: 22px;
            font-weight: bold;
        }

        p.subtitle {
            color: #003f87;
            margin: 0 0 10px 0;
            font-size: 13px;
            font-weight: bold;
        }

        /* Кнопки */
        .btn {
            display: inline-block;
            margin: 4px 3px;
            padding: 4px 10px;
            text-decoration: none;
            color: #000;
            font-weight: bold;
            font-size: 12px;
            border: 2px outset #fff;
            background: #e0e0e0;
            border-radius: 2px;
            box-shadow: inset 0 1px 0 #fff;
        }

        .btn.blue {
            background: #e0e0e0;
            color: #000;
            border: 2px outset #fff;
        }

        .btn:hover { background: #f5f5f5; }
        .btn:active { border-style: inset; }

        .designer-btn {
            background: #d4d4d4;
            border: 2px outset #fff;
            padding: 4px 10px;
            font-weight: bold;
            font-size: 12px;
            color: #000;
        }

        .designer-btn:hover { background: #f0f0f0; }
        .designer-btn:active { border-style: inset; }

        /* Hero section */
        .hero-section {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            justify-content: center;
            align-items: flex-start;
            position: relative;
            overflow: hidden;
            padding: 8px;
        }

        .lang-switch {
            display: flex;
            justify-content: center;
            margin-bottom: 8px;
            gap: 5px;
        }

        .lang-switch button {
            border: 2px outset #fff;
            background: #e0e0e0;
            color: #000;
            font-size: 11px;
            font-weight: bold;
            padding: 2px 8px;
            cursor: pointer;
        }

        .lang-switch button:hover {
            background: #f0f0f0;
        }

        .lang-switch button.active {
            border-color: #000080;
            background: #c0d4ff;
            color: #000;
        }
            background: #000080;
            color: #fff;
            border-color: #000;
        }

        .lang-switch button:hover { background: #f0f0f0; }

        /* Portfolio section */
        .portfolio-section {
            padding: 8px;
            text-align: left;
            background: #c0c0c0;
            border: 2px solid #000;
            border-radius: 2px;
            margin-top: 10px;
        }

        .portfolio-section h2 {
            margin: 0 0 4px;
            font-size: 14px;
            color: #fff;
            background: #000080;
            border: 1px solid #000;
            padding: 2px 4px;
            display: inline-block;
        }

        .portfolio-items {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
            gap: 6px;
            margin-top: 6px;
        }

        .portfolio-item {
            background: #fff;
            border: 2px solid #777;
            border-radius: 2px;
            padding: 8px;
            box-shadow: inset 0 1px 0 #fff;
        }

        .portfolio-item h3 { color: #000; font-size: 13px; margin: 0 0 4px; font-weight: bold; }
        .portfolio-item p { color: #222; font-size: 12px; margin: 0 0 4px; }
        .portfolio-item audio { width: 100%; margin-top: 4px; }

        .portfolio-item.visible { opacity: 1; transform: none; }
        }

        .portfolio-item p {
            color: #222;
            font-size: 12px;
            margin-bottom: 8px;
        }

        .portfolio-item audio {
            width: 100%;
            margin-top: 4px;
        }

        .btn.small {
            padding: 10px 15px;
            font-size: 14px;
            margin: 0;
        }
    </style>
</head>
<body>
    <div class="window">
        <div class="window-header">
            <div>nefrozzik BIO</div>
            <div class="window-controls"><span>_</span><span>□</span><span>X</span></div>
        </div>
        <div class="window-body">
    <div class="hero-section">
        <div class="card">
            <div class="avatar"></div>
            
            <div class="lang-switch">
                <button class="lang-btn active" data-lang="en">EN</button>
                <button class="lang-btn" data-lang="ru">RU</button>
            </div>

            <h1 data-i18n="heading">nefrozzik</h1>
            <p class="subtitle" data-i18n="subtitle">Musician</p>

            <div class="links">
                <a href="https://www.youtube.com/@nefrozzik" class="btn" data-i18n="youtube">▶️ YouTube</a>
                <a href="https://t.me/nefrozzik" class="btn blue" data-i18n="telegram">💬 Telegram</a>
                <a href="https://github.com/nefrozzik" class="btn blue" data-i18n="github">🐙 GitHub</a>
            </div>
        </div>

    </div>

    <div id="portfolio" class="portfolio-section">
        <h2 id="portfolioTitle">My Portfolio</h2>
        <div class="portfolio-items">
            <div class="portfolio-item">
                <h3 id="track1">‹/RAWR›</h3>
                <p id="track1desc">My Latest Work</p>
                <audio controls>
                    <source src="rawr.mp3" type="audio/mpeg">
                    Your browser does not support the audio element.
                </audio>
            </div>
            <div class="portfolio-item">
                <h3 id="track2">[hyperactivity]</h3>
                <p id="track2desc">My First Work</p>
                <audio controls>
                    <source src="hyperactivity.mp3" type="audio/mpeg">
                    Your browser does not support the audio element.
                </audio>
            </div>
            <div class="portfolio-item">
                <h3 id="track3">in progress</h3>
                <p id="track3desc">soon...</p>
            </div>
        </div>
    </div>
        </div>
    </div>

    <script>
        const i18nData = {
            en: {
                heading: 'nefrozzik',
                subtitle: 'Musician',
                youtube: '▶️ YouTube',
                telegram: '💬 Telegram',
                github: '🐙 GitHub',
                portfolioTitle: 'My Portfolio',
                track1: '‹/RAWR›',
                track1desc: 'My Latest Work',
                track2: '[hyperactivity]',
                track2desc: 'My First Work',
                track3: 'in progress',
                track3desc: 'soon...'
            },
            ru: {
                heading: 'nefrozzik',
                subtitle: 'Музыкант',
                youtube: '▶️ YouTube',
                telegram: '💬 Telegram',
                github: '🐙 GitHub',
                portfolioTitle: 'Моё Портфолио',
                track1: '‹/RAWR›',
                track1desc: 'Моя последняя работа',
                track2: '[hyperactivity]',
                track2desc: 'Моя первая работа',
                track3: 'в процессе',
                track3desc: 'скоро...'
            }
        };

        function setLanguage(lang) {
            document.querySelectorAll('[data-i18n]').forEach(el => {
                const key = el.dataset.i18n;
                if (i18nData[lang][key]) el.textContent = i18nData[lang][key];
            });
            document.getElementById('portfolioTitle').textContent = i18nData[lang].portfolioTitle;
            document.getElementById('track1').textContent = i18nData[lang].track1;
            document.getElementById('track1desc').textContent = i18nData[lang].track1desc;
            document.getElementById('track2').textContent = i18nData[lang].track2;
            document.getElementById('track2desc').textContent = i18nData[lang].track2desc;
            document.getElementById('track3').textContent = i18nData[lang].track3;
            document.getElementById('track3desc').textContent = i18nData[lang].track3desc;

            document.querySelectorAll('.lang-btn').forEach(btn => btn.classList.toggle('active', btn.dataset.lang === lang));
        }

        document.addEventListener('DOMContentLoaded', () => {
            document.querySelectorAll('.lang-btn').forEach(btn => {
                btn.addEventListener('click', () => setLanguage(btn.dataset.lang));
            });

            setLanguage('ru');

            const items = document.querySelectorAll('.portfolio-item');
            if ('IntersectionObserver' in window) {
                const observer = new IntersectionObserver((entries) => {
                    entries.forEach(entry => {
                        if (entry.isIntersecting) {
                            entry.target.classList.add('visible');
                            observer.unobserve(entry.target);
                        }
                    });
                }, { threshold: 0.15 });

                items.forEach(item => observer.observe(item));
            } else {
                items.forEach(item => item.classList.add('visible'));
            }
        });
    </script>

</body>
</html>
