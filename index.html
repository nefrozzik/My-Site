<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>bio.exe</title>
    <style>
        /* Плавная прокрутка */
        html {
            scroll-behavior: smooth;
        }

        /* Основной фон */
        body {
            margin: 0;
            padding: 14px;
            font-family: Tahoma, Arial, sans-serif;
            font-size: 10px;
            background: #3b8ec2;
            color: #000;
            min-height: 100vh;
        }

        .window {
            width: min(840px, 95%);
            margin: 0 auto;
            border: 2px solid #000;
            background: #c0c0c0;
            box-shadow: 2px 2px 0 #fff, 4px 4px 0 #444;
            overflow: hidden;
        }

        .window-header {
            background: #000080;
            color: #fff;
            padding: 5px 8px;
            font-weight: bold;
            font-size: 12px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 2px solid #4040a0;
            text-shadow: none;
        }

        .window-controls { display: flex; gap: 4px; }
        .window-controls span {
            width: 16px;
            height: 16px;
            border: 1px solid #999;
            background: #c0c0c0;
            color: #000;
            font-size: 12px;
            line-height: 16px;
            text-align: center;
            font-weight: bold;
            border-radius: 2px;
            box-shadow: inset 0 1px 0 rgba(255,255,255,0.7);
        }

        .window-body { background: #fff; padding: 12px; }

        /* АНИМАЦИИ */
        /* Classic XP: no animations */

        /* Карточка */
        .card {
            background: #f4f4f4;
            border: 2px solid #777;
            border-radius: 3px;
            padding: 10px;
            text-align: center;
            width: 100%;
            max-width: 360px;
            box-shadow: inset 0 1px 0 #fff;
        }

        /* Аватарка */
        .avatar {
            width: 90px;
            height: 90px;
            border-radius: 4px;
            background-image: url("avatar.jpg");
            background-size: cover;
            background-position: center;
            background-color: #999;
            margin: 0 auto 10px auto;
            border: 2px solid #666;
            box-shadow: inset 0 1px 0 #fff;
            transition: transform 0.2s ease, box-shadow 0.2s ease;
            display: block;
        }

        .avatar:hover {
            transform: scale(1.08);
            box-shadow: 0 0 0 1px #fff inset, 0 2px 6px rgba(0,0,0,0.3);
        }

        /* Типографика */
        h1 {
            color: #000;
            margin: 10px 0 4px;
            font-size: 22px;
            font-weight: bold;
        }

        p.subtitle {
            color: #003f87;
            margin: 0 0 10px 0;
            font-size: 13px;
            font-weight: bold;
        }

        /* Кнопки */
        .btn {
            display: inline-block;
            margin: 4px 3px;
            padding: 4px 10px;
            text-decoration: none;
            color: #000;
            font-weight: bold;
            font-size: 12px;
            border: 2px outset #fff;
            background: #e0e0e0;
            border-radius: 2px;
            box-shadow: inset 0 1px 0 #fff;
        }

        .btn.blue {
            background: #e0e0e0;
            color: #000;
            border: 2px outset #fff;
        }

        .btn:hover { background: #f5f5f5; }
        .btn:active { border-style: inset; }

        .designer-btn {
            background: #d4d4d4;
            border: 2px outset #fff;
            padding: 4px 10px;
            font-weight: bold;
            font-size: 12px;
            color: #000;
        }

        .designer-btn:hover { background: #f0f0f0; }
        .designer-btn:active { border-style: inset; }

        /* Hero section */
        .hero-section {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            justify-content: center;
            align-items: flex-start;
            position: relative;
            overflow: hidden;
            padding: 8px;
        }

        .lang-switch {
            display: flex;
            justify-content: center;
            margin-bottom: 8px;
            gap: 5px;
        }

        .lang-switch button {
            border: 2px outset #fff;
            background: #e0e0e0;
            color: #000;
            font-size: 11px;
            font-weight: bold;
            padding: 2px 8px;
            cursor: pointer;
        }

        .lang-switch button:hover {
            background: #f0f0f0;
        }

        .lang-switch button.active {
            border-color: #000080;
            background: #c0d4ff;
            color: #000;
        }

        .lang-switch button:hover { background: #f0f0f0; }

        /* Portfolio section */
        .portfolio-section {
            padding: 8px;
            text-align: left;
            background: #c0c0c0;
            border: 2px solid #000;
            border-radius: 2px;
            margin-top: 10px;
        }

        .portfolio-section h2 {
            margin: 0 0 4px;
            font-size: 14px;
            color: #fff;
            background: #000080;
            border: 1px solid #000;
            padding: 2px 4px;
            display: inline-block;
        }

        .portfolio-items {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
            gap: 6px;
            margin-top: 6px;
        }

        .portfolio-item {
            background: #fff;
            border: 2px solid #777;
            border-radius: 2px;
            padding: 8px;
            box-shadow: inset 0 1px 0 #fff;
        }

        .portfolio-item h3 { color: #000; font-size: 13px; margin: 0 0 4px; font-weight: bold; }
        .portfolio-item p { color: #222; font-size: 12px; margin: 0 0 4px; }
        .portfolio-item audio { width: 100%; margin-top: 4px; }

        .portfolio-item.visible { opacity: 1; transform: none; }

        .portfolio-item p {
            color: #222;
            font-size: 12px;
            margin-bottom: 8px;
        }

        .portfolio-item audio {
            width: 100%;
            margin-top: 4px;
        }

        .xp-player {
            margin-top: 10px;
            background: #e8ebf0;
            border: 2px solid #777;
            border-radius: 3px;
            padding: 8px;
            box-shadow: inset 0 1px 0 #fff;
        }
        .xp-player .title-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: linear-gradient(180deg, #0a4cc5, #003f8c);
            color: #fff;
            font-size: 11px;
            font-weight: bold;
            padding: 3px 6px;
            border: 1px solid #000;
            margin-bottom: 6px;
        }
        .xp-player .controls {
            display: flex;
            align-items: center;
            gap: 6px;
            margin-bottom: 6px;
        }
        .xp-player .controls button {
            background: #d6d6d6;
            border: 2px outset #fff;
            color: #000;
            font-weight: bold;
            padding: 3px 8px;
            cursor: pointer;
            border-radius: 2px;
            font-size: 11px;
        }
        .xp-player .controls button:active { border-style: inset; }
        .xp-player .progress-wrap {
            border: 2px solid #333;
            background: #fff;
            height: 12px;
            width: 100%;
            position: relative;
            cursor: pointer;
        }
        .xp-player .progress {
            background: #0b75ff;
            height: 100%;
            width: 0;
        }
        .xp-player .time {
            margin-top: 4px;
            font-size: 11px;
            color: #000;
            font-weight: bold;
        }

        .btn.small {
            padding: 10px 15px;
            font-size: 14px;
            margin: 0;
        }
    </style>
</head>
<body>
    <div class="window">
        <div class="window-header">
            <div>bio.exe</div>
            <div class="window-controls"><span>_</span><span>□</span><span>X</span></div>
        </div>
        <div class="window-body">
    <div class="hero-section">
        <div class="card">
            <div class="avatar"></div>
            
            <div class="lang-switch">
                <button class="lang-btn active" data-lang="en">EN</button>
                <button class="lang-btn" data-lang="ru">RU</button>
            </div>

            <h1 data-i18n="heading">nefrozzik</h1>
            <p class="subtitle" data-i18n="subtitle">Musician</p>

            <div class="links">
                <a href="https://www.youtube.com/@nefrozzik" class="btn" data-i18n="youtube">▶️ YouTube</a>
                <a href="https://t.me/nefrozzik" class="btn blue" data-i18n="telegram">💬 Telegram</a>
                <a href="https://github.com/nefrozzik" class="btn blue" data-i18n="github">🐙 GitHub</a>
            </div>
        </div>

    </div>
<div class="xp-player" id="xpPlayer">
            <div class="title-bar">
                <div id="playerTitle" data-i18n="playerTitle">XP Music Player</div>
                <div style="font-size: 10px;" data-i18n="playerVersion">v1.0</div>
            </div>
            <div class="controls">
                <button id="prevBtn" data-i18n="prevBtn">◀◀</button>
                <button id="playPauseBtn" data-i18n="playPauseBtn">▶</button>
                <button id="nextBtn" data-i18n="nextBtn">▶▶</button>
                <span id="currentTrack" style="margin-left: 8px; font-weight: bold; font-size: 12px;">‹/RAWR›</span>
            </div>
            <div class="progress-wrap" id="progressWrap">
                <div class="progress" id="progressBar"></div>
            </div>
            <div class="time"><span id="timeCurrent">0:00</span> / <span id="timeTotal">0:00</span></div>
        </div>
    <div id="portfolio" class="portfolio-section">
        <h2 id="portfolioTitle">My Portfolio</h2>
        <div class="portfolio-items">
            <div class="portfolio-item">
                <h3 id="track1">‹/RAWR›</h3>
                <p id="track1desc">My Latest Work</p>
                <button class="btn" data-track="0" data-i18n="playInPlayer">▶ Play in player</button>
            </div>
            <div class="portfolio-item">
                <h3 id="track2">[hyperactivity]</h3>
                <p id="track2desc">My First Work</p>
                <button class="btn" data-track="1" data-i18n="playInPlayer">▶ Play in player</button>
            </div>
            <div class="portfolio-item">
                <h3 id="track3">in progress</h3>
                <p id="track3desc">soon...</p>
                <button class="btn" disabled style="opacity: .5; cursor: not-allowed;" data-i18n="comingSoon">🔒 Coming soon</button>
            </div>
        </div>
    </div>
        </div>
    </div>
    <script>
        const i18nData = {
            en: {
                heading: 'nefrozzik',
                subtitle: 'Musician',
                youtube: '▶️ YouTube',
                telegram: '💬 Telegram',
                github: '🐙 GitHub',
                portfolioTitle: 'My Portfolio',
                playerTitle: 'XP Music Player',
                playerVersion: 'i really like this pretty thing',
                prevBtn: '◀◀',
                playPauseBtn: '▶',
                nextBtn: '▶▶',
                playInPlayer: '▶ Play in player',
                comingSoon: '🔒 Coming soon',
                track1: '‹/RAWR›',
                track1desc: 'My Latest Work',
                track2: '[hyperactivity]',
                track2desc: 'My First Work',
                track3: 'in progress',
                track3desc: 'soon...'
            },
            ru: {
                heading: 'nefrozzik',
                subtitle: 'Музыкант',
                youtube: '▶️ YouTube',
                telegram: '💬 Telegram',
                github: '🐙 GitHub',
                portfolioTitle: 'Моё Портфолио',
                playerTitle: 'Плеер XP',
                playerVersion: 'i really like this pretty thing',
                prevBtn: '◀◀',
                playPauseBtn: '▶',
                nextBtn: '▶▶',
                playInPlayer: '▶ Играть в плеере',
                comingSoon: '🔒 Скоро',
                track1: '‹/RAWR›',
                track1desc: 'Моя последняя работа',
                track2: '[hyperactivity]',
                track2desc: 'Моя первая работа',
                track3: 'в процессе',
                track3desc: 'скоро...'
            }
        };

        function setLanguage(lang) {
            document.querySelectorAll('[data-i18n]').forEach(el => {
                const key = el.dataset.i18n;
                if (i18nData[lang][key]) el.textContent = i18nData[lang][key];
            });
            document.getElementById('portfolioTitle').textContent = i18nData[lang].portfolioTitle;
            document.getElementById('track1').textContent = i18nData[lang].track1;
            document.getElementById('track1desc').textContent = i18nData[lang].track1desc;
            document.getElementById('track2').textContent = i18nData[lang].track2;
            document.getElementById('track2desc').textContent = i18nData[lang].track2desc;
            document.getElementById('track3').textContent = i18nData[lang].track3;
            document.getElementById('track3desc').textContent = i18nData[lang].track3desc;
            document.getElementById('playerTitle').textContent = i18nData[lang].playerTitle;
            document.querySelector('[data-i18n="playerVersion"]').textContent = i18nData[lang].playerVersion;
            document.getElementById('prevBtn').textContent = i18nData[lang].prevBtn;
            document.getElementById('playPauseBtn').textContent = i18nData[lang].playPauseBtn;
            document.getElementById('nextBtn').textContent = i18nData[lang].nextBtn;
            document.querySelectorAll('[data-i18n="playInPlayer"]').forEach(el => el.textContent = i18nData[lang].playInPlayer);
            document.querySelectorAll('[data-i18n="comingSoon"]').forEach(el => el.textContent = i18nData[lang].comingSoon);

            document.querySelectorAll('.lang-btn').forEach(btn => btn.classList.toggle('active', btn.dataset.lang === lang));
        }

        document.addEventListener('DOMContentLoaded', () => {
            document.querySelectorAll('.lang-btn').forEach(btn => {
                btn.addEventListener('click', () => setLanguage(btn.dataset.lang));
            });

            setLanguage('ru');

            const items = document.querySelectorAll('.portfolio-item');
            if ('IntersectionObserver' in window) {
                const observer = new IntersectionObserver((entries) => {
                    entries.forEach(entry => {
                        if (entry.isIntersecting) {
                            entry.target.classList.add('visible');
                            observer.unobserve(entry.target);
                        }
                    });
                }, { threshold: 0.15 });

                items.forEach(item => observer.observe(item));
            } else {
                items.forEach(item => item.classList.add('visible'));
            }

            const tracks = [
                { title: '‹/RAWR›', src: 'rawr.mp3' },
                { title: '[hyperactivity]', src: 'hyperactivity.mp3' }
            ];
            let currentTrackIndex = 0;
            const audio = new Audio(tracks[0].src);
            const playPauseBtn = document.getElementById('playPauseBtn');
            const prevBtn = document.getElementById('prevBtn');
            const nextBtn = document.getElementById('nextBtn');
            const currentTrackEl = document.getElementById('currentTrack');
            const progressBar = document.getElementById('progressBar');
            const progressWrap = document.getElementById('progressWrap');
            const timeCurrent = document.getElementById('timeCurrent');
            const timeTotal = document.getElementById('timeTotal');

            function updateTrackText() {
                currentTrackEl.textContent = tracks[currentTrackIndex].title;
            }

            function playTrack() {
                audio.play().catch(() => {});
                playPauseBtn.textContent = '⏸';
            }

            function pauseTrack() {
                audio.pause();
                playPauseBtn.textContent = '▶';
            }

            function setTrack(index) {
                currentTrackIndex = (index + tracks.length) % tracks.length;
                audio.src = tracks[currentTrackIndex].src;
                audio.load();
                updateTrackText();
                playTrack();
            }

            playPauseBtn.addEventListener('click', () => {
                if (audio.paused) playTrack(); else pauseTrack();
            });
            prevBtn.addEventListener('click', () => setTrack(currentTrackIndex - 1));
            nextBtn.addEventListener('click', () => setTrack(currentTrackIndex + 1));

            document.querySelectorAll('[data-track]').forEach(btn => {
                btn.addEventListener('click', () => {
                    const idx = Number(btn.dataset.track);
                    if (!Number.isNaN(idx)) setTrack(idx);
                });
            });

            audio.addEventListener('timeupdate', () => {
                if (audio.duration) {
                    const percent = (audio.currentTime / audio.duration) * 100;
                    progressBar.style.width = percent + '%';
                    const format = (sec) => {
                        const m = Math.floor(sec / 60);
                        const s = Math.floor(sec % 60).toString().padStart(2, '0');
                        return `${m}:${s}`;
                    };
                    timeCurrent.textContent = format(audio.currentTime);
                    timeTotal.textContent = format(audio.duration);
                }
            });

            progressWrap.addEventListener('click', (event) => {
                if (!audio.duration) return;
                const rect = progressWrap.getBoundingClientRect();
                const percent = (event.clientX - rect.left) / rect.width;
                audio.currentTime = percent * audio.duration;
            });

            audio.addEventListener('ended', () => setTrack(currentTrackIndex + 1));
            updateTrackText();
        });
    </script>

</body>
</html>
