<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Release Page</title>
    <style>
        body { margin: 0; padding: 14px; font-family: Tahoma, Arial, sans-serif; font-size: 11px; background: #3a6ea5; color: #000; min-height: 100vh; display: flex; justify-content: center; align-items: center; cursor: url("data:image/svg+xml,%3Csvg width='15' height='22' viewBox='0 0 15 22' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M1,1 l0,14 l3,-3 l2,5 l2,-1 l-2,-5 l4,0 z' fill='white' stroke='black' stroke-width='1.2'/%3E%3C/svg%3E"), default; }
        a, button, .window-controls img, .menu-items span { cursor: url("data:image/svg+xml,%3Csvg width='15' height='22' viewBox='0 0 15 22' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M1,1 l0,14 l3,-3 l2,5 l2,-1 l-2,-5 l4,0 z' fill='white' stroke='black' stroke-width='1.2'/%3E%3C/svg%3E"), pointer !important; }
        body::after { content: " "; display: block; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.1) 50%), linear-gradient(90deg, rgba(255, 0, 0, 0.03), rgba(0, 255, 0, 0.01), rgba(0, 0, 255, 0.03)), radial-gradient(circle, rgba(0,0,0,0) 60%, rgba(0,0,0,0.3) 100%); z-index: 9998; background-size: 100% 3px, 3px 100%, 100% 100%; pointer-events: none; }

        @keyframes openWindow { 0% { transform: scale(0.9); opacity: 0; } 100% { transform: scale(1); opacity: 1; } }
        @keyframes blinkCursor { 0%, 100% { opacity: 1; } 50% { opacity: 0; } }

        .window { width: min(420px, 100%); border: 2px solid #000; background: #ece9d8; box-shadow: 2px 2px 0 #fff, 4px 4px 0 #444; position: relative; z-index: 10; display: none; flex-direction: column; opacity: 0; } 
        .window.show { animation: openWindow 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.1) forwards; }
        .window-header { background: linear-gradient(180deg, #0a4cc5, #003f8c); color: #fff; padding: 5px 8px; font-weight: bold; font-size: 12px; display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid #4040a0; }
        .window-controls { display: flex; gap: 2px; }
        .window-controls img { width: 21px; height: 21px; border-radius: 3px; transition: transform 0.1s, filter 0.1s; }
        .window-controls img:hover { filter: brightness(1.2); }
        .window-controls img:active { transform: translateY(2px) scale(0.92); filter: brightness(0.8); }
        .blink { animation: blinkCursor 1s step-end infinite; }

        .menu-bar { background: #ece9d8; border-bottom: 1px solid #aca899; padding: 2px 8px; display: flex; justify-content: space-between; align-items: center; font-size: 11px; flex-wrap: wrap; gap: 5px; }
        .menu-items span { margin-right: 8px; padding: 2px 4px; color: #000; border: 1px solid transparent; display: inline-block; transition: transform 0.1s; text-decoration: none; font-weight: normal; }
        .menu-items span:hover { background: #316ac5; color: #fff; border: 1px solid #000; border-radius: 2px; }
        .menu-items span:active { transform: translateY(2px); }

        .lang-switch { display: flex; gap: 2px; }
        .lang-switch button { border: 1px solid transparent; background: transparent; color: #000; font-size: 10px; padding: 2px 6px; border-radius: 2px; transition: transform 0.1s; cursor: pointer; }
        .lang-switch button:hover { background: #c1d2ee; border: 1px solid #316ac5; }
        .lang-switch button.active { background: #c1d2ee; border: 1px solid #316ac5; font-weight: bold; }
        .lang-switch button:active { transform: translateY(2px); }

        .window-body { padding: 20px; background: #fff; border-top: 1px solid #fff; text-align: center; }
        
        .cover-art { width: 220px; height: 220px; margin: 0 auto 15px auto; border: 2px solid #777; border-radius: 4px; background-color: #e0e0e0; background-size: cover; background-position: center; box-shadow: inset 0 1px 0 #fff, 0 4px 8px rgba(0,0,0,0.3); transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275), box-shadow 0.3s ease; }
        .cover-art:hover { transform: scale(1.05); box-shadow: inset 0 1px 0 #fff, 0 8px 16px rgba(0,0,0,0.4); }
        
        .track-title { font-size: 22px; font-weight: bold; margin: 0 0 5px 0; color: #000; }
        .track-author { font-size: 14px; color: #003f8c; margin: 0 0 15px 0; font-weight: bold; }
        
        .divider { height: 2px; border-top: 1px solid #aca899; border-bottom: 1px solid #fff; margin: 15px 0; }
        .choose-service { font-size: 12px; font-weight: bold; color: #555; margin-bottom: 12px; text-transform: uppercase; letter-spacing: 1px; }

        .platform-list { display: flex; flex-direction: column; gap: 8px; }
        .platform-btn { display: flex; justify-content: space-between; align-items: center; background: #e0e0e0; border: 2px outset #fff; padding: 10px 14px; text-decoration: none; color: #000; font-weight: bold; transition: all 0.2s ease; border-radius: 2px; box-shadow: inset 0 1px 0 #fff; }
        .platform-btn:hover { background: #c1d2ee; border-color: #316ac5; transform: translateY(-2px); box-shadow: 0 4px 8px rgba(0,0,0,0.15); }
        .platform-btn:active { border-style: inset; transform: translateY(1px) scale(0.98); box-shadow: none; background: #a6c0e8; }
        .platform-name { font-size: 13px; display: flex; align-items: center; gap: 8px; }
        .platform-action { background: linear-gradient(180deg, #0a4cc5, #003f8c); color: #fff; padding: 4px 10px; font-size: 10px; border-radius: 2px; border: 1px solid #000; transition: filter 0.2s; }
        .platform-btn:hover .platform-action { filter: brightness(1.2); }

        .error-msg { color: red; font-weight: bold; padding: 20px; font-size: 14px; }
    </style>
</head>
<body>

<div class="window" id="release-window">
    <div class="window-header">
        <div id="win-title">Smartlink.exe<span class="blink">_</span></div>
        <div class="window-controls">
            <img src="Minimize.png" alt="-">
            <img src="Maximize.png" alt="[]">
            <img src="Exit.png" alt="X" onclick="window.location.href='index.html'">
        </div>
    </div>
    
    <div class="menu-bar">
        <div class="menu-items">
            <span onclick="window.location.href='index.html'" data-i18n="back" style="font-weight: bold;">⬅ Назад</span>
            <span data-i18n="menuFile">Файл</span>
            <span data-i18n="menuEdit">Правка</span>
            <span data-i18n="menuView">Вид</span>
            <span data-i18n="menuHelp">Справка</span>
        </div>
        <div class="lang-switch">
            <button class="lang-btn" data-lang="en">EN</button>
            <button class="lang-btn active" data-lang="ru">RU</button>
        </div>
    </div>
    
    <div class="window-body">
        <div class="cover-art" id="track-cover"></div>
        <h1 class="track-title" id="track-title">Загрузка...</h1>
        <p class="track-author" id="track-author"></p>
        
        <div class="divider"></div>
        <div class="choose-service" id="choose-text" data-i18n="choose">Выберите сервис</div>
        
        <div class="platform-list" id="platforms-container">
            </div>
    </div>
</div>

<script>
    const params = new URLSearchParams(window.location.search);
    const trackId = params.get('id');
    let currentLang = localStorage.getItem('siteLang') || 'ru';
    let currentTrackData = null; // Сохраняем данные трека для смены языка на лету

    const strings = {
        en: { 
            back: "⬅ Back", menuFile: "File", menuEdit: "Edit", menuView: "View", menuHelp: "Help", 
            choose: "Choose music service", play: "PLAY ▶", error: "Track not found!", winTitle: "Release" 
        },
        ru: { 
            back: "⬅ Назад", menuFile: "Файл", menuEdit: "Правка", menuView: "Вид", menuHelp: "Справка", 
            choose: "Слушать на платформах", play: "СЛУШАТЬ ▶", error: "Трек не найден!", winTitle: "Релиз" 
        }
    };

    function setLanguage(lang) {
        currentLang = lang;
        localStorage.setItem('siteLang', lang); 
        
        document.querySelectorAll('[data-i18n]').forEach(el => {
            const key = el.dataset.i18n;
            if (strings[lang][key]) el.textContent = strings[lang][key];
        });

        document.querySelectorAll('.lang-btn').forEach(btn => btn.classList.toggle('active', btn.dataset.lang === lang));

        if (currentTrackData) {
            document.getElementById('win-title').innerHTML = currentTrackData[`title_${lang}`] + " - " + strings[lang].winTitle + '<span class="blink">_</span>';
            document.getElementById('track-title').textContent = currentTrackData[`title_${lang}`] || "Unknown Track";
            
            // Обновляем текст на кнопках платформ
            document.querySelectorAll('.platform-action').forEach(btn => {
                btn.textContent = strings[lang].play;
            });
        }
    }

    async function loadRelease() {
        const win = document.getElementById('release-window');
        const container = document.getElementById('platforms-container');
        
        try {
            const res = await fetch('server.php?action=getData');
            const data = await res.json();
            
            if (!data || data.error) throw new Error("No data");

            if (data.tracks) {
                currentTrackData = data.tracks.find((t, index) => (t.slug === trackId) || (index.toString() === trackId));
            }

            // Плавное появление окна
            win.style.display = 'flex';
            setTimeout(() => { win.classList.add('show'); }, 50);

            if (currentTrackData) {
                document.getElementById('track-author').textContent = (data.profile && data.profile[currentLang]) ? data.profile[currentLang] : "";
                
                if (currentTrackData.cover) {
                    document.getElementById('track-cover').style.backgroundImage = `url('${currentTrackData.cover}')`;
                }

                container.innerHTML = '';
                if (currentTrackData.platforms && currentTrackData.platforms.length > 0) {
                    currentTrackData.platforms.forEach(p => {
                        container.insertAdjacentHTML('beforeend', `
                            <a href="${p.url}" class="platform-btn" target="_blank">
                                <span class="platform-name">🎵 ${p.name}</span>
                                <span class="platform-action">${strings[currentLang].play}</span>
                            </a>
                        `);
                    });
                } else {
                    container.innerHTML = `<p style="color:#777; font-style: italic;">Ссылки пока не добавлены.</p>`;
                }
                
                setLanguage(currentLang);

            } else {
                document.querySelector('.window-body').innerHTML = `<div class="error-msg">${strings[currentLang].error}</div>`;
            }
        } catch (e) {
            win.style.display = 'flex';
            setTimeout(() => { win.classList.add('show'); }, 50);
            document.querySelector('.window-body').innerHTML = `<div class="error-msg">Ошибка сервера или нет данных.</div>`;
        }
    }

    document.querySelectorAll('.lang-btn').forEach(btn => {
        btn.addEventListener('click', () => setLanguage(btn.dataset.lang));
    });

    loadRelease();
    setLanguage(currentLang);
</script>
</body>
</html>
